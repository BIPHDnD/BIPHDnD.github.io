<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIPH - D&D</title>
    <link rel="icon" href="images/d20icon.png">
    
<style>
    body {
        background-color: #2d2d2d;
        font-family: 'Andika', sans-serif;
        color: #ffffff;
        margin: 0;
        padding: 16px;
        line-height: 1.6;
        text-align: center; 
        overflow-x: hidden;
        min-height: 100dvh;
    }

    /* Background */
    .background, .overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: -4;
    }

    .background {
        background-size: cover;
        background-position: center center;
        filter: brightness(0.72) contrast(1.18) saturate(0.95);
        transition: opacity 1.2s ease;
    }

    .overlay {
        background: linear-gradient(135deg, rgba(28, 28, 32, 0.456), rgba(12, 12, 18, 0.722));
        z-index: -3;
    }

    /* Header */
    .header {
        margin: 45px auto 40px;
        padding: 20px 0;
    }

    .biph-container {
        margin-bottom: 25px;
        margin-right: 240px;
    }

    .biph-text {
        font-size: clamp(3rem, 5vw, 2rem);
        letter-spacing: 6px;
        color: #ffdd88;
        text-shadow: 4px 3px 0 #000, 0 0 35px rgba(138, 138, 137, 0.7);
        line-height: 1;
        margin: 0;
    }

    .dnd-container {
        display: flex;
        justify-content: center;
        margin: -60px 0 30px;
    }

    .dnd-logo {
        height: 220px;
        width: auto;
        max-width: 95%;
        max-height: 280px;           /* Safety limit */
        object-fit: contain;         /* Ensures no stretching */
        filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.8));
    }

    .red-divider {
        height: 6px;
        background: linear-gradient(to right, transparent, #c41e3a, #ff3366, #c41e3a, transparent);
        margin: 30px auto;
        max-width: 420px;
        box-shadow: 0 3px 12px rgba(196, 30, 58, 0.65);
    }

    /* Buttons */
    .container {
        max-width: 340px;
        margin: -50px auto 100px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 0 20px;
    }

    .button {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        font-family: 'Verdana', sans-serif;
        font-size: clamp(1.45rem, 5.5vw, 1.8rem);
        color: white;
        text-decoration: none;
        background: linear-gradient(135deg, rgba(55, 55, 65, 0.95), rgba(40, 40, 50, 0.95));
        border: 3px solid #b0b0b0;
        border-radius: 30px;
        transition: all 0.4s ease;
        box-shadow: 0 5px 18px rgba(0, 0, 0, 0.5),
                    0 0 20px rgba(180, 180, 200, 0.3);
        width: 100%;
        max-width: 380px;
        position: relative;
        overflow: hidden;
    }

    .button:hover {
        background: linear-gradient(135deg, rgba(80, 80, 95, 1), rgba(60, 60, 80, 1));
        border-color: #ffdd88;
        transform: translateY(-6px) scale(1.03);
        box-shadow: 0 12px 28px rgba(150, 100, 200, 0.4),
                    0 0 35px rgba(255, 220, 100, 0.5);
    }

    .button span {
        position: relative;
        z-index: 2;
        text-shadow: 0 2px 4px rgba(0,0,0,0.7);
    }

</style>
</head>
<body>
    <div class="background" id="background"></div>
    <div class="overlay"></div>

    <!-- Header -->
    <div class="header">
        <div class="biph-container">
            <h1 class="biph-text" id="biph-text">BIPH</h1>
        </div>
        
        <div class="dnd-container">
            <img src="images/dnd.png" alt="D&D" class="dnd-logo">
        </div>
        
        <div class="red-divider"></div>
    </div>

    <div class="container">
        <a href="https://biphdnd.github.io/strixhaven/" class="button">
            <span>Strixhaven</span>
        </a>

        <a href="https://biphdnd.github.io/dicesim/" class="button">
            <span>Dice Sim</span>
        </a>
    </div>

    <script>
        const bgImages = Array.from({length: 15}, (_, i) => `images/${i+1}.jpg`);
        
        function setRandomBackground() {
            const randomIndex = Math.floor(Math.random() * bgImages.length);
            const bgElement = document.getElementById('background');
            const biphText = document.getElementById('biph-text');
            
            bgElement.style.backgroundImage = `url('${bgImages[randomIndex]}')`;
            
            switch(randomIndex + 1) {
                case 1:  biphText.style.color = "#ffcc00"; break;
                case 2:  biphText.style.color = "#ff8866"; break;
                case 3:  biphText.style.color = "#aaff88"; break;
                case 4:  biphText.style.color = "#88ccff"; break;
                case 5:  biphText.style.color = "#ff99ee"; break;
                case 6:  biphText.style.color = "#ffee77"; break;
                case 7:  biphText.style.color = "#cc88ff"; break;
                case 8:  biphText.style.color = "#77ffcc"; break;
                case 9:  biphText.style.color = "#ff7744"; break;
                case 10: biphText.style.color = "#aaccff"; break;
                case 11: biphText.style.color = "#ffdd88"; break;
                case 12: biphText.style.color = "#88ffaa"; break;
                case 13: biphText.style.color = "#ff99bb"; break;
                case 14: biphText.style.color = "#77ddff"; break;
                case 15: biphText.style.color = "#ffcc66"; break;
                default: biphText.style.color = "#ffdd88";
            }
        }

        window.onload = setRandomBackground;
    </script>
</body>
</html>
