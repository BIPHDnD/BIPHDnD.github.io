<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strixhaven</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #030912 0%, #0a1426 50%, #1a2a3f 100%);
      position: relative;
      overflow-x: hidden;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
    }
    .font-orbitron {
      font-family: 'Orbitron', sans-serif;
    }
    .font-great-vibes {
      font-family: 'Great Vibes', cursive;
    }
    .hotkey-box {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 2.5rem;
      height: 1.5rem;
      padding: 0 0.4rem;
      background-color: #1a1a1a;
      border-radius: 0.375rem;
      font-size: 0.7rem;
      font-weight: bold;
      text-align: center;
    }
    .title {
      font-family: 'Georgia', serif;
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 900;
            color: #ffffff;
            text-shadow: 
                4px 3px 0 #000,    
                0 0 25px #88cbff;
            letter-spacing: 4px;
        }

.red-divider {
      height: 6px;
      background: linear-gradient(to right, transparent, #c41e3a, #ff3366, #c41e3a, transparent);
      margin: 10px auto;
      max-width: 420px;
      box-shadow: 0 3px 10px rgba(196, 30, 58, 0.7);
      opacity: 100;
      animation: fadeInUp 1.8s ease 0.8s forwards;
    }


    .flash-button {
      transition: background-color 0.2s ease;
    }
    /* Compact scene buttons */
    .scene-btn {
      min-width: 120px;
      max-width: 180px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0.4rem 0.6rem;
      gap: 0.15rem;
      text-align: center;
      font-size: 0.85rem;
    }
    .scene-btn-char {
      min-width: 130px;
      max-width: 190px;
    }
    #scene-row-1, #scene-row-2 {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      width: 100%;
    }
    /* Compact sound buttons */
    #sound-buttons button {
      padding: 0.4rem 0.6rem;
      font-size: 0.9rem;
      min-height: 2.5rem;
    }
    .hotkey-box-sm {
      height: 1.4rem;
      font-size: 0.65rem;
      padding: 0 0.35rem;
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center p-3">
  <canvas id="stars"></canvas>

  <h1 class="title">Strixhaven</h1>
  <h2 class="text">Show Control</h2>
  <div class="red-divider"></div>

  <!-- Scene Buttons: Row 1 (Scenes 1–7) -->
  <div class="mb-3 w-full">
    <div id="scene-row-1"></div>
  </div>

  <!-- Character Row -->
  <div class="mb-5 w-full">
    <div id="scene-row-2"></div>
  </div>

  <!-- Sound Buttons -->
  <div id="sound-buttons" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 w-full max-w-5xl mb-6"></div>

  <!-- Search Modal -->
  <div id="search-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-900 rounded-lg shadow-2xl w-full max-w-2xl mx-4 border border-gray-700">
      <div class="p-3">
        <input
          type="text"
          id="search-input"
          placeholder="Search scenes or sound effects..."
          class="w-full px-3 py-2 bg-gray-800 text-white rounded-md border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base"
          autocomplete="off"
        />
        <div id="search-results" class="mt-2 max-h-80 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <script>
    // Starry background animation
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = [];
    for (let i = 0; i < 100; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5,
        alpha: Math.random(),
        speed: Math.random() * 0.02 + 0.01
      });
    }

    function animateStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
        ctx.fill();
        star.alpha += star.speed;
        if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
      });
      requestAnimationFrame(animateStars);
    }
    animateStars();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // MIDI
    let midiAccess = null;
    let currentScene = 'opening_intro';

    // === SCENE CONFIG ===
    const sceneConfig = {
      opening_intro:     { midiNote: 50, hotkey: '1', row: 1, display: 'Opening Intro' },
      space:             { midiNote: 51, hotkey: '2', row: 1, display: 'Space' },
      small_fighting:    { midiNote: 52, hotkey: '3', row: 1, display: 'Small Fighting' },
      three_door:        { midiNote: 53, hotkey: '4', row: 1, display: 'Three Door' },
      fire_and_water_room: { midiNote: 54, hotkey: '5', row: 1, display: 'Fire & Water Room' },
      treasure_room:     { midiNote: 55, hotkey: '6', row: 1, display: 'Treasure Room' },
      final_battle:      { midiNote: 61, hotkey: '7', row: 1, display: 'Final Battle' },

      lyric:            { midiNote: 56, hotkey: 'Shift+B', row: 2, display: 'Lyric' },
      turing:           { midiNote: 57, hotkey: 'Shift+I', row: 2, display: 'Turing' },
      aleric:          { midiNote: 58, hotkey: 'Shift+F', row: 2, display: 'Aleric' },
      xeno:           { midiNote: 59, hotkey: 'Shift+Z', row: 2, display: 'Xeno' },
      mike:             { midiNote: 60, hotkey: 'Shift+T', row: 2, display: 'Mike' }
    };

    // === SOUND CONFIG (MIDI only) ===
    const scenes = {
      opening_intro: [
        { name: 'Critical Success', midiNote: 62 },
        { name: 'Critical Fail', midiNote: 63 },
        { name: 'Opening Music', midiNote: 64 },
        { name: 'Gravity Reverse', midiNote: 65 }
      ],
      space: [
        { name: 'Spaceship', midiNote: 66 },
        { name: 'Alert to Jump', midiNote: 67 }
      ],
      small_fighting: [
        { name: 'Small Battle Music', midiNote: 68 }
      ],
      three_door: [
        { name: 'Stone Door Opening', midiNote: 69 },
        { name: 'Flaming Trap', midiNote: 70 },
        { name: 'Soldier Attacking', midiNote: 71 },
        { name: 'Pit Trap', midiNote: 72 }
      ],
      fire_and_water_room: [
        { name: 'Stone Door Opening', midiNote: 73 },
        { name: 'Lever', midiNote: 74 },
        { name: 'Water Emerging', midiNote: 75 },
        { name: 'Lava Emerging', midiNote: 76 }
      ],
      treasure_room: [
        { name: 'Chest Opening', midiNote: 77 },
        { name: 'Ice Chipping', midiNote: 78 },
        { name: 'Jewels', midiNote: 79 },
        { name: 'Gas Releasing', midiNote: 80 },
        { name: 'Smashing Wood', midiNote: 81 }
      ],
      lyric: [
        { name: 'Fairy Fires', midiNote: 82 },
        { name: 'Detect Magic', midiNote: 83 },
        { name: 'Healing Word', midiNote: 84 },
        { name: 'Regeneration', midiNote: 85 },
        { name: 'Thunder', midiNote: 86 },
        { name: 'Spike', midiNote: 87 },
        { name: 'Magic Growth', midiNote: 88 },
        { name: 'Wither and Bloom', midiNote: 89 },
        { name: 'GoodBerry', midiNote: 90 },
        { name: 'Water', midiNote: 91 },
        { name: 'Spider', midiNote: 92 },
        { name: 'Spider Web', midiNote: 93 },
        { name: 'Toad', midiNote: 94 },
        { name: 'Toad Swallowing', midiNote: 95 },
        { name: 'Wolves', midiNote: 96 },
        { name: 'Wolves Biting', midiNote: 97 }
      ],
      turing: [
        { name: 'Katana Swing', midiNote: 98 },
        { name: 'Minor Illusion', midiNote: 99 },
        { name: 'Mirror Image', midiNote: 100 },
        { name: 'Mage Hand', midiNote: 101 },
        { name: 'Shadow Blade', midiNote: 102 },
        { name: 'Burning Hand', midiNote: 103 },
        { name: 'Shatter', midiNote: 104 },
        { name: 'Shield Block', midiNote: 105 },
        { name: 'Shield Field', midiNote: 106 },
        { name: 'Blooming Blade', midiNote: 107 },
        { name: 'Blooming 2', midiNote: 108 }
      ],
      aleric: [
        { name: 'Bow and Arrow', midiNote: 109 },
        { name: 'Divination', midiNote: 110 },
        { name: 'Hunter\'s Mark', midiNote: 111 },
        { name: 'Sword Swinging', midiNote: 112 }
      ],
      xeno: [
        { name: 'Mage Hand', midiNote: 113 },
        { name: 'Shocking Grasp', midiNote: 114 },
        { name: 'Illusion', midiNote: 115 },
        { name: 'Light', midiNote: 116 },
        { name: 'Grease', midiNote: 117 },
        { name: 'Fire Sphere', midiNote: 118 },
        { name: 'Mind Spike', midiNote: 119 },
        { name: 'Regeneration', midiNote: 120 },
        { name: 'Sword Swinging', midiNote: 121 },
        { name: 'Bow and Arrow', midiNote: 122 },
        { name: 'Ice', midiNote: 123 },
        { name: 'Wind', midiNote: 124 }
      ],
      mike: [
        { name: 'Spare the Dying', midiNote: 125 },
        { name: 'Healing Word', midiNote: 126 },
        { name: 'Spiritual Weapon', midiNote: 127 },
        { name: 'Cure Wounds', midiNote: 70 },
        { name: 'Prayer of Healing', midiNote: 71 },
        { name: 'Guided Bolt', midiNote: 72 },
        { name: 'Bless', midiNote: 73 },
        { name: 'Pullaxe', midiNote: 74 }
      ],
      final_battle: [
        { name: 'Pre Battle', midiNote: 75 },
        { name: 'Battle', midiNote: 76 }
      ]
    };

    // === SMART HOTKEYS + MANUAL OVERRIDE ===
    function assignHotkeys(sceneName) {
      const sounds = scenes[sceneName];
      const used = new Set();
      sounds.forEach(sound => {
        if (sound.name === 'Pullaxe') {
          sound.hotkey = 'A';
          used.add('A');
          return;
        }

        const words = sound.name.split(/\s+/).filter(w => w.length > 0);
        let hotkey = null;

        for (const word of words) {
          const first = word[0].toUpperCase();
          if (!used.has(first)) {
            hotkey = first;
            used.add(first);
            break;
          }
        }

        if (!hotkey) {
          for (const word of words) {
            for (const c of word.toUpperCase()) {
              if (!used.has(c)) {
                hotkey = c;
                used.add(c);
                break;
              }
            }
            if (hotkey) break;
          }
        }

        sound.hotkey = hotkey || '?';
      });
    }
    Object.keys(scenes).forEach(assignHotkeys);

    // === MIDI ===
    async function initMIDI() {
      if (!navigator.requestMIDIAccess) return null;
      try {
        midiAccess = await navigator.requestMIDIAccess();
        const outputs = Array.from(midiAccess.outputs.values());
        if (outputs.length === 0) return null;
        let output = outputs.find(out => out.name.includes('IAC Driver Bus 1'));
        if (!output) output = outputs[0];
        return output;
      } catch (err) {
        return null;
      }
    }

    function sendMIDINote(midiOutput, note) {
      if (midiOutput) {
        try {
          midiOutput.send([0x90, note, 0x7F]);
          setTimeout(() => midiOutput.send([0x80, note, 0x00]), 100);
        } catch (err) {}
      }
    }

    function flashButton(button) {
      if (!button) return;
      button.classList.add('bg-yellow-500', 'flash-button');
      setTimeout(() => {
        button.classList.remove('bg-yellow-500', 'flash-button');
      }, 150);
    }

    // === RENDER SCENES ===
    function renderSceneButtons() {
      const row1 = document.getElementById('scene-row-1');
      const row2 = document.getElementById('scene-row-2');
      row1.innerHTML = '';
      row2.innerHTML = '';

      Object.keys(sceneConfig).forEach(scene => {
        const cfg = sceneConfig[scene];
        const container = cfg.row === 1 ? row1 : row2;
        const button = document.createElement('button');
        const isChar = cfg.row === 2;
        button.className = `scene-btn rounded ${currentScene === scene ? 'bg-blue-600' : 'bg-gray-700'} hover:bg-blue-500 transition ${isChar ? 'scene-btn-char' : ''}`;
        button.setAttribute('data-scene', scene);

        const isShift = cfg.hotkey.startsWith('Shift+');
        const keyLabel = isShift ? `Shift + ${cfg.hotkey[6]}` : cfg.hotkey;

        button.innerHTML = `
          <span class="text-xs leading-tight">${cfg.display}</span>
          <span class="hotkey-box">${keyLabel}</span>
        `;

        button.addEventListener('click', async () => {
          currentScene = scene;
          flashButton(button);
          const midiOutput = await initMIDI();
          sendMIDINote(midiOutput, cfg.midiNote);
          renderSceneButtons();
          renderSoundButtons();
        });
        container.appendChild(button);
      });
    }

    function renderSoundButtons() {
      const container = document.getElementById('sound-buttons');
      container.innerHTML = '';
      scenes[currentScene].forEach(sound => {
        const button = document.createElement('button');
        button.className = 'bg-gray-700 hover:bg-blue-500 rounded transition flex items-center justify-between w-full text-sm';
        button.setAttribute('data-sound', sound.name);
        button.innerHTML = `
          <span class="flex-1 text-left truncate pr-2">${sound.name}</span>
          <span class="hotkey-box hotkey-box-sm">${sound.hotkey}</span>
        `;
        button.addEventListener('click', async () => {
          flashButton(button);
          const midiOutput = await initMIDI();
          sendMIDINote(midiOutput, sound.midiNote);
        });
        container.appendChild(button);
      });
    }

    // === SEARCH SYSTEM ===
    const searchModal = document.getElementById('search-modal');
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    let searchResultsList = [];
    let selectedIndex = 0;
    let isSearchOpen = false;

    const allItems = [
      ...Object.entries(sceneConfig).map(([key, cfg]) => ({
        type: 'scene',
        key,
        name: cfg.display,
        midiNote: cfg.midiNote
      })),
      ...Object.entries(scenes).flatMap(([scene, sounds]) =>
        sounds.map(sound => ({
          type: 'sound',
          scene,
          name: sound.name,
          midiNote: sound.midiNote
        }))
      )
    ];

    function openSearch() {
      searchModal.classList.remove('hidden');
      searchInput.focus();
      searchInput.value = '';
      searchResults.innerHTML = '';
      isSearchOpen = true;
      selectedIndex = 0;
      updateResults('');
    }

    function closeSearch() {
      searchModal.classList.add('hidden');
      isSearchOpen = false;
      searchInput.value = '';
      searchResults.innerHTML = '';
      selectedIndex = 0;
    }

    function wordStartSearch(query, text) {
      if (!query) return false;
      const words = text.toLowerCase().split(/\s+/);
      const q = query.toLowerCase();
      return words.some(word => word.startsWith(q));
    }

    function updateResults(query) {
      searchResults.innerHTML = '';
      if (!query.trim()) {
        searchResultsList = [];
        return;
      }

      const filtered = allItems
        .filter(item => wordStartSearch(query, item.name))
        .slice(0, 15);

      searchResultsList = filtered;

      if (filtered.length === 0) {
        const div = document.createElement('div');
        div.className = 'px-3 py-1 text-gray-500 italic text-sm';
        div.textContent = 'No results';
        searchResults.appendChild(div);
        return;
      }

      filtered.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = `px-3 py-2 cursor-pointer transition text-sm ${i === selectedIndex ? 'bg-blue-600' : 'hover:bg-gray-700'}`;
        const typeLabel = item.type === 'scene' ? 'Scene' : 'Sound';
        const context = item.type === 'sound' ? item.scene.replace(/_/g, ' ') : '';
        div.innerHTML = `
          <div class="flex justify-between items-center">
            <div>
              <div class="font-medium">${item.name}</div>
              <div class="text-xs text-gray-400">${typeLabel}${context ? ' to ' + context : ''}</div>
            </div>
          </div>
        `;
        div.addEventListener('click', () => triggerItem(item));
        searchResults.appendChild(div);
      });

      highlightSelected();
    }

    function highlightSelected() {
      Array.from(searchResults.children).forEach((el, i) => {
        if (i === selectedIndex) {
          el.classList.add('bg-blue-600');
          el.classList.remove('hover:bg-gray-700');
          el.scrollIntoView({ block: 'nearest' });
        } else {
          el.classList.remove('bg-blue-600');
          el.classList.add('hover:bg-gray-700');
        }
      });
    }

    async function triggerItem(item) {
      closeSearch();
      const midiOutput = await initMIDI();
      sendMIDINote(midiOutput, item.midiNote);

      if (item.type === 'scene') {
        currentScene = item.key;
        renderSceneButtons();
        renderSoundButtons();
        const btn = document.querySelector(`[data-scene="${item.key}"]`);
        if (btn) flashButton(btn);
      } else {
        setTimeout(() => {
          const btn = document.querySelector(`#sound-buttons button[data-sound="${item.name}"]`);
          if (btn) flashButton(btn);
        }, 50);
      }
    }

    // === HOTKEYS ===
    document.addEventListener('keydown', async (e) => {
      if (isSearchOpen) return;

      if (e.key === '/' && e.target === document.body) {
        e.preventDefault();
        openSearch();
        return;
      }

      const key = e.shiftKey && e.key.match(/^[A-Z]$/) ? `Shift+${e.key}` : e.key.toUpperCase();
      const scene = Object.keys(sceneConfig).find(s => sceneConfig[s].hotkey === key);
      if (scene) {
        currentScene = scene;
        const midiOutput = await initMIDI();
        sendMIDINote(midiOutput, sceneConfig[scene].midiNote);
        renderSceneButtons();
        renderSoundButtons();
        const btn = document.querySelector(`[data-scene="${scene}"]`);
        if (btn) flashButton(btn);
        return;
      }

      const sound = scenes[currentScene].find(s => s.hotkey === key);
      if (sound) {
        const btn = document.querySelector(`#sound-buttons button[data-sound="${sound.name}"]`);
        if (btn) flashButton(btn);
        const midiOutput = await initMIDI();
        sendMIDINote(midiOutput, sound.midiNote);
      }
    });

    // Search input
    searchInput.addEventListener('input', e => {
      selectedIndex = 0;
      updateResults(e.target.value);
    });

    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeSearch(); return; }
      if (e.key === 'Enter' && searchResultsList.length > 0) {
        e.preventDefault();
        triggerItem(searchResultsList[selectedIndex]);
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIndex = (selectedIndex + 1) % searchResultsList.length;
        highlightSelected();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIndex = (selectedIndex - 1 + searchResultsList.length) % searchResultsList.length;
        highlightSelected();
      }
    });

    searchModal.addEventListener('click', e => {
      if (e.target === searchModal) closeSearch();
    });

    // Init
    initMIDI().then(() => {
      renderSceneButtons();
      renderSoundButtons();
    });
  </script>
</body>
</html>
