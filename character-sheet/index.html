<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Sheet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

        body {
            font-family: 'MedievalSharp', cursive;
            background-color: #2c3e50;
            color: #ecf0f1;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-image: url('images/parchment.jpg');
            background-size: cover;
            background-attachment: scroll;
            background-position: center;
            background-repeat: repeat-y;
            opacity: 0.9; /* Reduced opacity */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .basic-info {
            flex: 1;
        }

        .character-name-container {
            position: fixed;
            top: -35px;
            left: -15px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 10px;
            border-radius: 5px;
        }

        .character-name {
            font-size: 36px;
            color: #6f5a18;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.232);
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px 10px;
            display: inline-block;
            letter-spacing: 2px;
            margin-bottom: 0px;
        }

        .character-subtitle {
            font-size: 18px;
            color: #6f5a18;
            margin-top: -5px;
            margin-left: 12px;
            margin-bottom: 100px;
        }
        .character-name:hover {
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 5px;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: rgba(52, 73, 94, 0.9);
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 5px;
            top: 100%; /* Position the content right below the character name */
            left: 0; /* Align with the left edge of the dropdown */
        }

        .dropdown-content button {
            color: #ecf0f1;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-family: 'MedievalSharp', cursive;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dropdown-content button:hover {
            background-color: rgba(41, 128, 185, 0.7);
        }

        .show {
            display: block;
        }

        .basic-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .basic-info-grid label {
            color: #000000; /* Black text for labels */
            font-weight: bold;
            margin-left: 10px;
        }

        .basic-info-grid .value-display {
            color: #6f5a18; /* Visible text for values */
            font-size: 16px;
            margin-top: 5px;
            margin-left: 10px;
        }

        .portrait-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .portrait-edit-button {
            margin-bottom: -40px;
            margin-left: 100px;
            background-color: rgba(127, 140, 141, 0.7);
            color: #ecf0f1;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 16px;
            transform: scaleX(-1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            opacity: 0;
            z-index: 2;
        }

        .portrait-edit-button:hover,
        .portrait:hover .portrait-edit-button {
            opacity: 1;
            background-color: rgba(149, 165, 166, 0.9);
        }

        .portrait {
            width: 150px;
            height: 266.67px; /* 9:16 ratio */
            background-color: rgba(52, 73, 94, 0.8);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            color: #ecf0f1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.8); /* Added shadow */
            transition: all 0.3s ease;
            position: relative; /* Added for positioning the edit button */
            overflow: hidden; /* Add this to contain the background image */
            cursor: pointer;
        }

        .portrait::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: 1; /* Set a low z-index for the background image */
        }

        .portrait:hover {
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.8);
        }

        .portrait .edit-button {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 200; /* Ensure the button is above the background image */
            background-color: rgba(127, 140, 141, 0.7);
            color: #ecf0f1;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 16px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .portrait:hover .edit-button {
            display: flex;
        }

        .portrait .edit-button:hover {
            background-color: rgba(149, 165, 166, 0.9);
        }

        .portrait-dropdown {
            display: none;
            position: absolute;
            background-color: rgba(52, 73, 94, 0.9);
            border-radius: 5px;
            padding: 5px;
            z-index: 3;
            top: 45px;
            right: 10px;
        }

        .portrait-dropdown button {
            display: block;
            width: 100%;
            padding: 5px 10px;
            margin: 5px 0;
            background: none;
            border: none;
            color: #ecf0f1;
            cursor: pointer;
            text-align: left;
            font-family: 'MedievalSharp', cursive;
            transition: background-color 0.3s;
        }

        .portrait-dropdown button:hover {
            background-color: rgba(41, 128, 185, 0.7);
        }

        .portrait.has-image .edit-button {
            display: none;
        }

        .portrait.show-menu .portrait-dropdown {
            display: block;
        }

        .section {
            background-color: rgba(52, 73, 94, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.8);
            transition: all 0.3s ease;
        }

        .section:hover {
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.8);
        }

        .section h2 {
            margin-top: 0px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(41, 128, 185, 0.7);
            border-radius: 5px;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .stat:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.15);
        }

        input, textarea {
            width: calc(100% - 10px);
            padding: 5px;
            margin-top: 5px;
            background-color: rgba(236, 240, 241, 0.9);
            border: none;
            border-radius: 3px;
            font-family: 'MedievalSharp', cursive;
        }

        .edit-button {
        position: absolute;
        top: 10px; /* Changed from 25px */
        right: 15px;
        background-color: rgba(127, 140, 141, 0.7);
        color: #ecf0f1;
        border: none;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        font-size: 16px;
        cursor: pointer;
        display: none; /* Changed from flex */
        align-items: center;
        justify-content: center;
        transform: scaleX(-1);
        transition: all 0.3s ease;
    }

        .section:hover .edit-button {
            display: flex;
            opacity: 1;
        }

        .edit-button:hover {
            background-color: rgba(149, 165, 166, 0.9);
        }

        .edit-button.editing {
            transform: scaleX(1);
        }

        .value-display {
            font-size: 18px;
            font-weight: bold;
            color: #ecf0f1;
            margin-top: 5px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .input-container {
            display: none;
        }

        .section.editing .value-display {
            display: none;
        }

        .section.editing .input-container {
            display: block;
        }

        .number-input-container {
            position: relative;
            display: flex;
            align-items: center;
            height: 30px;
        }

        .number-input-container input[type="number"] {
            width: calc(100% - 25px);
            height: 100%;
            padding: 0 5px;
        }

        .number-input-container .stepper {
            display: flex;
            flex-direction: column;
            width: 20px;
            height: 100%;
            margin-left: 5px;
        }

        .number-input-container .stepper button {
            flex: 1;
            padding: 0;
            margin: 0;
            background-color: rgba(149, 165, 166, 0.7);
            border: none;
            color: #ecf0f1;
            font-size: 8px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .number-input-container .stepper button:first-child {
            margin-bottom: 1px;
        }

        .number-input-container .stepper button:hover {
            background-color: rgba(127, 140, 141, 0.9);
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #e74c3c, 0 0 20px #e74c3c, 0 0 35px #e74c3c, 0 0 40px #e74c3c, 0 0 50px #e74c3c;
            }
            to {
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #e74c3c, 0 0 40px #e74c3c, 0 0 70px #e74c3c, 0 0 80px #e74c3c, 0 0 100px #e74c3c;
            }
        }

        .modifier {
            font-size: 12px;
            color: #ecf0f1;
            text-align: center;
            margin-top: 2px;
        }

        .roll-button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }

        .roll-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }

        .roll-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        #roll-result {
            font-size: 24px;
            margin-top: 10px;
        }

        .equipped-items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .equipped-item {
            background-color: rgba(41, 128, 185, 0.7);
            border-radius: 5px;
            padding: 10px;
            text-align: center;
        }

        .equipped-item label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        .equipment-stats {
            background-color: rgba(41, 128, 185, 0.7);
            border-radius: 5px;
            padding: 10px;
            margin-top: 20px;
        }

        .equipment-stats div {
            margin-bottom: 10px;
        }

        .equipment-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .equipped-items-container, .inventory-container {
            flex: 1;
            min-width: 300px;
        }

        .equipped-items {
            width: 300px;
            height: 400px;
            background-color: rgba(41, 128, 185, 0.3);
            position: relative;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(11, 30px);
            gap: 2px;
            background-color: rgba(41, 128, 185, 0.3);
            padding: 5px;
        }

        .equipped-slot, .inventory-slot {
            background-color: #2c3e50; /* Dark gray for empty slots */
            border: 1px solid #34495e;
        }

        .equipped-slot:has(.item), .inventory-slot:has(.item) {
            background-color: #3498db; /* Blue for filled slots */
        }

        #helmet-slot {
            top: 10px;
            left: 125px;
            width: 50px;
            height: 50px;
        }

        #amulet-slot {
            top: 10px;
            left: 185px;
            width: 30px;
            height: 30px;
        }

        #armor-slot {
            top: 70px;
            left: 100px;
            width: 100px;
            height: 150px;
        }

        #weapon-slot {
            top: 70px;
            left: 10px;
            width: 80px;
            height: 150px;
        }

        #offhand-slot {
            top: 70px;
            right: 10px;
            width: 80px;
            height: 150px;
        }

        #gloves-slot {
            top: 230px;
            left: 10px;
            width: 50px;
            height: 50px;
        }

        #ring1-slot {
            top: 230px;
            left: 70px;
            width: 30px;
            height: 30px;
        }

        #ring2-slot {
            top: 230px;
            right: 70px;
            width: 30px;
            height: 30px;
        }

        #pants-slot {
            top: 230px;
            left: 100px;
            width: 100px;
            height: 100px;
        }

        #boots-slot {
            top: 340px;
            left: 125px;
            width: 50px;
            height: 50px;
        }

        .item {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            cursor: move;
        }

        .item-tooltip {
            display: none;
            position: absolute;
            background-color: rgba(44, 62, 80, 0.9);
            color: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            pointer-events: none;
        }

        .basic-info {
            position: relative;
        }

        .basic-info .edit-button {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .basic-info:hover .edit-button {
            display: flex;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .dialog-content {
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .dialog-content button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'MedievalSharp', cursive;
            transition: background-color 0.3s;
        }

        .dialog-content button:hover {
            background-color: #2980b9;
        }

        .basic-info {
            position: relative;
        }

        .basic-info .edit-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(127, 140, 141, 0.7);
            color: #ecf0f1;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .basic-info .edit-button:hover {
            background-color: rgba(149, 165, 166, 0.9);
        }

        .basic-info .input-container {
            display: none;
        }

        .basic-info.editing .value-display,
        .basic-info.editing .character-name,
        .basic-info.editing .character-subtitle {
            display: none;
        }

        .basic-info.editing .input-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .basic-info.editing .input-container input {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            background-color: rgba(236, 240, 241, 0.9);
            border: none;
            border-radius: 3px;
            font-family: 'MedievalSharp', cursive;
        }

        .basic-info.editing .input-container input[type="number"] {
            width: calc(100% - 10px);
        }

        #initial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #content-wrapper {
            filter: blur(0px);
            transition: filter 0.5s ease-in-out;
        }

        #initial-dialog {
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1000;
        }

        .fade-in {
            opacity: 1 !important;
        }

        .dialog-content {
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .dialog-content h2 {
            color: #ecf0f1;
            margin-bottom: 20px;
        }

        .dialog-content button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'MedievalSharp', cursive;
            transition: background-color 0.3s;
        }

        .dialog-content button:hover {
            background-color: #2980b9;
        }

        #new-character-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            font-family: 'MedievalSharp', cursive;
            border: none;
            border-radius: 5px;
        }

        .gold-pieces {
            margin-top: 20px;
        }

        .gold-pieces .input-container {
            display: none;
            margin-top: 10px;
        }

        .gold-pieces.editing .input-container {
            display: flex;
            align-items: center;
        }

        .gold-pieces.editing #gold-pieces-value {
            display: none;
        }

        .item-edit-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .item-edit-content {
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        .item-edit-content input, .item-edit-content select {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }

        .item-edit-content button {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="initial-overlay">
        <div id="initial-dialog" class="overlay">
            <div class="dialog-content">
                <h2>And so it begins...</h2>
                <button onclick="loadExistingCharacter()">Load Existing Character</button>
                <button onclick="createNewCharacter()">Create New Character</button>
            </div>
        </div>
    </div>

    <div id="content-wrapper">
        <div class="header">
            <div class="basic-info">
                <div class="character-name-container">
                    <div class="dropdown">
                        <h1 class="character-name" id="character-name-display" onclick="toggleDropdown()">Character name</h1>
                        <div id="myDropdown" class="dropdown-content">
                            <button onclick="importCharacter()">Load Game</button>
                            <button onclick="exportCharacter()">Save Game</button>
                        </div>
                    </div>
                    <div class="character-subtitle" id="character-subtitle-display"></div>
                </div>
                <div class="basic-info-grid">
                    <div>
                        <label for="race">Race:</label>
                        <div class="value-display" id="race-display"></div>
                        <div class="input-container">
                            <input type="text" id="race" name="race">
                        </div>
                    </div>
                    <div>
                        <label for="class">Class:</label>
                        <div class="value-display" id="class-display"></div>
                        <div class="input-container">
                            <input type="text" id="class" name="class">
                        </div>
                    </div>
                    <div>
                        <label for="level">Level:</label>
                        <div class="value-display" id="level-display"></div>
                        <div class="input-container">
                            <input type="number" id="level" name="level" min="1" max="20">
                        </div>
                    </div>
                    <div>
                        <label for="background">Background:</label>
                        <div class="value-display" id="background-display"></div>
                        <div class="input-container">
                            <input type="text" id="background" name="background">
                        </div>
                    </div>
                    <div>
                        <label for="alignment">Alignment:</label>
                        <div class="value-display" id="alignment-display"></div>
                        <div class="input-container">
                            <input type="text" id="alignment" name="alignment">
                        </div>
                    </div>
                </div>
                <button class="edit-button" onclick="toggleEdit(this)">✎</button>
                <div class="input-container">
                    <input type="text" id="character-name" name="character-name">
                    <input type="text" id="character-subtitle" name="character-subtitle">
                </div>
            </div>
            <div class="portrait-container">
                <button class="portrait-edit-button" onclick="editPortrait()">✎</button>
                <div class="portrait">
                    BG
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Ability Scores</h2>
            <button class="edit-button" onclick="toggleEdit(this)">✎</button>
            <div class="grid">
                <div class="stat">
                    <label for="strength">Strength:</label>
                    <div class="value-display" id="strength-display"></div>
                    <div class="modifier" id="strength-modifier"></div>
                    <button class="roll-button" onclick="rollAbility('strength')">Roll</button>
                    <div class="input-container">
                        <div class="number-input-container">
                            <input type="number" id="strength" name="strength" min="1" max="20" onchange="updateModifier(this)">
                            <div class="stepper">
                                <button onclick="stepInput(this, 1)">▲</button>
                                <button onclick="stepInput(this, -1)">▼</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="stat">
                    <label for="dexterity">Dexterity:</label>
                    <div class="value-display" id="dexterity-display"></div>
                    <div class="modifier" id="dexterity-modifier"></div>
                    <button class="roll-button" onclick="rollAbility('dexterity')">Roll</button>
                    <div class="input-container">

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const initialDialog = document.getElementById('initial-dialog');
            initialDialog.style.display = 'flex';
            setTimeout(() => {
                initialDialog.classList.add('fade-in');
            }, 100);
        });

        let currentCharacterFile = '';

        function loadExistingCharacter() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(event) {
                const file = event.target.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const character = JSON.parse(e.target.result);
                        loadCharacter(character);
                        removeInitialOverlay();
                    } catch (error) {
                        console.error('Error parsing character file:', error);
                        alert('Error loading character. Please check the file format.');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function createNewCharacter() {
            const dialogContent = document.querySelector('.dialog-content');
            dialogContent.innerHTML = `
                <h2>Create a new character</h2>
                <input type="text" id="new-character-input" placeholder="Enter character name">
                <button onclick="confirmNewCharacter()">Create</button>
            `;
        }

        function confirmNewCharacter() {
            const characterName = document.getElementById('new-character-input').value.trim();
            if (characterName) {
                document.getElementById('character-name-display').textContent = characterName;
                document.getElementById('character-subtitle-display').textContent = "The Adventurer";
                
                // Initialize a new character object
                const newCharacter = {
                    name: characterName,
                    subtitle: "The Adventurer",
                    race: "",
                    class: "",
                    level: "1",
                    background: "",
                    alignment: "",
                    abilityScores: {
                        strength: "10",
                        dexterity: "10",
                        constitution: "10",
                        intelligence: "10",
                        wisdom: "10",
                        charisma: "10"
                    },
                    skills: {
                        acrobatics: "0",
                        animalHandling: "0",
                        arcana: "0",
                        athletics: "0",
                        deception: "0",
                        history: "0",
                        insight: "0",
                        intimidation: "0",
                        investigation: "0",
                        medicine: "0",
                        nature: "0",
                        perception: "0",
                        performance: "0",
                        persuasion: "0",
                        religion: "0",
                        sleightOfHand: "0",
                        stealth: "0",
                        survival: "0"
                    },
                    equipment: []
                };
                
                // Load the new character data
                loadCharacter(newCharacter);
                
                // Set the current character file name
                currentCharacterFile = `${characterName}.json`;
                

                removeInitialOverlay();
            } else {
                alert('Please enter a character name.');
            }
        }

        function removeInitialOverlay() {
            const overlay = document.getElementById('initial-overlay');
            const contentWrapper = document.getElementById('content-wrapper');
            
            overlay.style.opacity = '0';
            contentWrapper.style.filter = 'blur(0)';
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 500);
        }

        function loadCharacter(character) {
            // Basic Info
            document.getElementById('character-name-display').textContent = character.name;
            document.getElementById('character-subtitle-display').textContent = character.subtitle;
            document.getElementById('race-display').textContent = character.race;
            document.getElementById('class-display').textContent = character.class;
            document.getElementById('level-display').textContent = character.level;
            document.getElementById('background-display').textContent = character.background;
            document.getElementById('alignment-display').textContent = character.alignment;

            // Portrait
            if (character.portrait) {
                const portraitElement = document.querySelector('.portrait');
                const img = new Image();
                img.onload = function() {
                    const aspectRatio = img.width / img.height;
                    const portraitHeight = portraitElement.offsetHeight;
                    const portraitWidth = portraitElement.offsetWidth;
                    let newWidth, newHeight;

                    if (aspectRatio > 1) {
                        // Landscape image
                        newHeight = portraitHeight;
                        newWidth = newHeight * aspectRatio;
                    } else {
                        // Portrait image
                        newWidth = portraitWidth;
                        newHeight = newWidth / aspectRatio;
                    }

                    portraitElement.style.backgroundImage = `url(${character.portrait})`;
                    portraitElement.style.backgroundSize = `contain`;
                    portraitElement.style.backgroundPosition = 'center';
                    portraitElement.style.backgroundRepeat = 'no-repeat';
                    portraitElement.textContent = '';
                    portraitElement.classList.add('has-image');
                };
                img.src = character.portrait;
            }

            // Ability Scores
            for (const [name, score] of Object.entries(character.abilityScores)) {
                const display = document.getElementById(`${name}-display`);
                if (display) {
                    display.textContent = score;
                    const input = document.getElementById(name);
                    if (input) {
                        input.value = score;
                        updateModifier(input);
                    }
                }
            }

            // Skills and Combat Stats
            for (const [name, value] of Object.entries(character.skills)) {
                const display = document.getElementById(`${name}-display`);
                if (display) {
                    display.textContent = value;
                }
            }

            // Equipment
            clearInventory();
            if (character.equipment && Array.isArray(character.equipment)) {
                character.equipment.forEach(item => addItemToInventory(item));
            }

            updateEquipmentStats();
            updateSlotColors();

        }

        function clearInventory() {
            const slots = document.querySelectorAll('.inventory-slot, .equipped-slot');
            slots.forEach(slot => {
                while (slot.firstChild) {
                    slot.removeChild(slot.firstChild);
                }
            });
        }

        function addItemToInventory(item) {
            const slots = document.querySelectorAll('.inventory-slot:not(:has(.item))');
            if (slots.length > 0) {
                const itemElement = createItemElement(item);
                slots[0].appendChild(itemElement);
            }
        }

        function createItemElement(item) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item';
            itemDiv.draggable = true;
            itemDiv.dataset.item = JSON.stringify(item);
            itemDiv.style.backgroundImage = `url('images/${item.image || 'default_item.png'}')`;
            return itemDiv;
        }

        function toggleEdit(button) {
            const section = button.closest('.section') || button.closest('.basic-info');
            section.classList.toggle('editing');
            button.classList.toggle('editing');

            if (section.classList.contains('editing')) {
                const inputs = section.getElementsByTagName('input');
                const textareas = section.getElementsByTagName('textarea');

                for (let input of inputs) {
                    const display = document.getElementById(`${input.id}-display`);
                    if (display) {
                        input.value = display.textContent;
                    }
                }

                for (let textarea of textareas) {
                    const display = document.getElementById(`${textarea.id}-display`);
                    if (display) {
                        textarea.value = display.textContent;
                    }
                }

                // Special handling for character name and subtitle
                if (section.classList.contains('basic-info')) {
                    document.getElementById('character-name').value = document.getElementById('character-name-display').textContent;
                    document.getElementById('character-subtitle').value = document.getElementById('character-subtitle-display').textContent;
                    
                    // Move the edit button to the top of the basic-info section
                    const editButton = section.querySelector('.edit-button');
                    section.insertBefore(editButton, section.firstChild);
                }

                // Add specific handling for inventory section
                if (section.querySelector('.inventory-grid')) {
                    const slots = section.querySelectorAll('.inventory-slot, .equipped-slot');
                    slots.forEach(slot => {
                        slot.onclick = section.classList.contains('editing') ? editItem : null;
                    });
                }

                // Add specific handling for gold pieces
                const goldPieces = section.querySelector('.gold-pieces');
                if (goldPieces) {
                    goldPieces.classList.toggle('editing');
                }
            } else {
                updateDisplayValues(section);
                
                // Move the edit button back to its original position for basic-info
                if (section.classList.contains('basic-info')) {
                    const editButton = section.querySelector('.edit-button');
                    section.appendChild(editButton);
                }
            }
        }

        function updateDisplayValues(section) {
            const inputs = section.getElementsByTagName('input');
            const textareas = section.getElementsByTagName('textarea');

            for (let input of inputs) {
                const display = document.getElementById(`${input.id}-display`);
                if (display) {
                    display.textContent = input.value;
                }
                if (input.closest('.stat')) {
                    updateModifier(input);
                }
            }

            for (let textarea of textareas) {
                const display = document.getElementById(`${textarea.id}-display`);
                if (display) {
                    display.textContent = textarea.value;
                }
            }

            // Special handling for character name and subtitle
            if (section.classList.contains('basic-info')) {
                document.getElementById('character-name-display').textContent = document.getElementById('character-name').value;
                document.getElementById('character-subtitle-display').textContent = document.getElementById('character-subtitle').value;
            }

        }

        function toggleDropdown(event) {
            event.stopPropagation(); // Prevent the event from bubbling up
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Close the dropdown if the user clicks outside of it
        window.onclick = function(event) {
            if (!event.target.matches('.character-name')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        function editItem(event) {
            const slot = event.currentTarget;
            const item = slot.firstChild ? JSON.parse(slot.firstChild.dataset.item) : null;
            
            const overlay = document.createElement('div');
            overlay.className = 'item-edit-overlay';
            overlay.innerHTML = `
                <div class="item-edit-content">
                    <input type="text" id="item-name" placeholder="Item Name" value="${item ? item.name : ''}">
                    <input type="text" id="item-type" placeholder="Item Type" value="${item ? item.type : ''}">
                    <input type="number" id="item-ac" placeholder="Armor Class" value="${item && item.ac ? item.ac : ''}">
                    <input type="text" id="item-damage" placeholder="Damage" value="${item && item.damage ? item.damage : ''}">
                    <input type="text" id="item-effect" placeholder="Effect" value="${item && item.effect ? item.effect : ''}">
                    <select id="item-image">
                        ${getItemImageOptions(item ? item.image : '')}
                    </select>
                    <button onclick="saveItem(this, ${slot.dataset.index})">Save Item</button>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.style.display = 'flex';
        }

        function getItemImageOptions(selectedImage) {
            const images = ['helmet.png', 'chainmail.png', 'longsword.png', 'shield.png', 'gloves.png', 'ring.png', 'boots.png', 'amulet.png', 'plate.png', 'dagger.png', 'sapphire_ring.png', 'steel_boots.png', 'leather_pants.png', 'plate_leggings.png'];
            return images.map(img => `<option value="${img}" ${img === selectedImage ? 'selected' : ''}>${img}</option>`).join('');
        }

        function saveItem(button, slotIndex) {
            const content = button.closest('.item-edit-content');
            const item = {
                name: content.querySelector('#item-name').value,
                type: content.querySelector('#item-type').value,
                ac: content.querySelector('#item-ac').value,
                damage: content.querySelector('#item-damage').value,
                effect: content.querySelector('#item-effect').value,
                image: content.querySelector('#item-image').value
            };

            const slot = document.querySelector(`.inventory-slot[data-index="${slotIndex}"], .equipped-slot[data-index="${slotIndex}"]`);
            if (slot.firstChild) {
                slot.firstChild.remove();
            }
            slot.appendChild(createItemElement(item));

            updateEquipmentStats();
            updateSlotColors();

            const overlay = button.closest('.item-edit-overlay');
            overlay.style.display = 'none';
            overlay.remove();
        }

        function addGold() {
            const input = document.getElementById('gold-pieces-input');
            const value = document.getElementById('gold-pieces-value');
            value.textContent = parseInt(value.textContent) + parseInt(input.value);
            input.value = '';
        }

        function subtractGold() {
            const input = document.getElementById('gold-pieces-input');
            const value = document.getElementById('gold-pieces-value');
            const newValue = parseInt(value.textContent) - parseInt(input.value);
            value.textContent = newValue >= 0 ? newValue : 0;
            input.value = '';
        }

        // Modify createInventoryGrid function to add data-index to slots
        function createInventoryGrid() {
            const inventoryGrid = document.querySelector('.inventory-grid');
            for (let i = 0; i < 110; i++) {
                const slot = document.createElement('div');
                slot.className = 'inventory-slot';
                slot.dataset.index = i;
                slot.addEventListener('dragover', allowDrop);
                slot.addEventListener('drop', drop);
                inventoryGrid.appendChild(slot);
            }
        }

        // Modify updateEquipmentStats function to handle new item structure
        function updateEquipmentStats() {
            let totalAC = 10; // Base AC
            let weapon = "No weapon equipped";

            document.querySelectorAll('.equipped-slot .item').forEach(itemElement => {
                const item = JSON.parse(itemElement.dataset.item);
                if (item.ac) {
                    totalAC += parseInt(item.ac) || 0;
                }
                if (item.type === 'weapon') {
                    weapon = `${item.name} (${item.damage} damage)`;
                }
            });

            document.getElementById('total-ac-value').textContent = totalAC;
            document.getElementById('weapon-stats-value').textContent = weapon;
        }

        window.onload = function() {
            createInventoryGrid();
            populateInventory();
            populateEquippedItems();
            updateEquipmentStats();
            updateSlotColors();
            const numberInputs = document.querySelectorAll('input[type="number"]');
            numberInputs.forEach(createNumberInputContainer);
            const abilityScoreInputs = document.querySelectorAll('.stat input[type="number"]');
            abilityScoreInputs.forEach(updateModifier);

            // Add event listener for character name dropdown
            document.querySelector('.character-name').addEventListener('click', toggleDropdown);
        }

    <script>
        const inventoryItems = [
            { name: "Steel Helmet", type: "helmet", ac: 2, image: "helmet.png" },
            { name: "Chainmail", type: "armor", ac: 5, image: "chainmail.png" },
            { name: "Longsword", type: "weapon", damage: "1d8", image: "longsword.png" },
            { name: "Wooden Shield", type: "offhand", ac: 1, image: "shield.png" },
            { name: "Leather Gloves", type: "gloves", ac: 1, image: "gloves.png" },
            { name: "Ruby Ring", type: "ring", effect: "+1 STR", image: "ring.png" },
            { name: "Leather Boots", type: "boots", ac: 1, image: "boots.png" },
            { name: "Amulet of Health", type: "amulet", effect: "+2 CON", image: "amulet.png" },
            { name: "Plate Armor", type: "armor", ac: 8, image: "plate.png" },
            { name: "Dagger", type: "weapon", damage: "1d4", image: "dagger.png" },
            { name: "Sapphire Ring", type: "ring", effect: "+1 INT", image: "sapphire_ring.png" },
            { name: "Steel Boots", type: "boots", ac: 2, image: "steel_boots.png" },
            { name: "Leather Pants", type: "pants", ac: 1, image: "leather_pants.png" },
            { name: "Plate Leggings", type: "pants", ac: 3, image: "plate_leggings.png" },
        ];

        function createInventoryGrid() {
            const inventoryGrid = document.querySelector('.inventory-grid');
            for (let i = 0; i < 110; i++) {
                const slot = document.createElement('div');
                slot.className = 'inventory-slot';
                slot.dataset.index = i;
                slot.addEventListener('dragover', allowDrop);
                slot.addEventListener('drop', drop);
                inventoryGrid.appendChild(slot);
            }
        }

        function populateInventory() {
            const slots = document.querySelectorAll('.inventory-slot');
            inventoryItems.forEach((item, index) => {
                const itemElement = createItemElement(item);
                slots[index].appendChild(itemElement);
            });
        }

        function populateEquippedItems() {
            const equippedSlots = {
                "helmet-slot": inventoryItems.find(item => item.type === "helmet"),
                "armor-slot": inventoryItems.find(item => item.type === "armor"),
                "weapon-slot": inventoryItems.find(item => item.type === "weapon"),
                "offhand-slot": inventoryItems.find(item => item.type === "offhand"),
                "gloves-slot": inventoryItems.find(item => item.type === "gloves"),
                "boots-slot": inventoryItems.find(item => item.type === "boots"),
                "ring1-slot": inventoryItems.find(item => item.type === "ring"),
                "amulet-slot": inventoryItems.find(item => item.type === "amulet"),
                "pants-slot": inventoryItems.find(item => item.type === "pants"),
            };

            for (const [slotId, item] of Object.entries(equippedSlots)) {
                if (item) {
                    const slot = document.getElementById(slotId);
                    slot.appendChild(createItemElement(item));
                }
            }
        }

        function createItemElement(item) {
            const itemElement = document.createElement('div');
            itemElement.className = 'item';
            itemElement.draggable = true;
            itemElement.style.backgroundImage = `url(${item.image})`;
            itemElement.dataset.item = JSON.stringify(item);
            itemElement.addEventListener('dragstart', drag);
            itemElement.addEventListener('mouseover', showTooltip);
            itemElement.addEventListener('mouseout', hideTooltip);
            return itemElement;
        }

        function showTooltip(event) {
            const item = JSON.parse(event.target.dataset.item);
            const tooltip = document.getElementById('item-tooltip');
            tooltip.innerHTML = `
                <h3>${item.name}</h3>
                <p>Type: ${item.type}</p>
                ${item.ac ? `<p>AC: +${item.ac}</p>` : ''}
                ${item.damage ? `<p>Damage: ${item.damage}</p>` : ''}
                ${item.effect ? `<p>Effect: ${item.effect}</p>` : ''}
            `;
            tooltip.style.display = 'block';
            tooltip.style.left = `${event.pageX + 10}px`;
            tooltip.style.top = `${event.pageY + 10}px`;
        }

        function hideTooltip() {
            document.getElementById('item-tooltip').style.display = 'none';
        }

        function drag(event) {
            event.dataTransfer.setData('text/plain', event.target.dataset.item);
        }

        function allowDrop(event) {
            event.preventDefault();
        }

        function drop(event) {
            event.preventDefault();
            const itemData = event.dataTransfer.getData('text');
            const item = JSON.parse(itemData);
            const target = event.target.closest('.inventory-slot, .equipped-slot');

            if (target.classList.contains('equipped-slot')) {
                if (target.dataset.type === item.type) {
                    if (target.firstChild) {
                        const inventorySlot = findEmptyInventorySlot();
                        if (inventorySlot) {
                            inventorySlot.appendChild(target.firstChild);
                        } else {
                            return; // Inventory is full, can't equip new item
                        }
                    }
                    target.appendChild(createItemElement(item));
                    updateEquipmentStats();
                }
            } else {
                if (target.firstChild) {
                    const sourceSlot = document.querySelector(`.item[data-item='${itemData}']`).parentNode;
                    sourceSlot.appendChild(target.firstChild);
                }
                target.appendChild(createItemElement(item));
            }
            updateSlotColors();
            updateEquipmentStats();
        }

        function findEmptyInventorySlot() {
            const slots = document.querySelectorAll('.inventory-slot');
            for (let slot of slots) {
                if (!slot.firstChild) {
                    return slot;
                }
            }
            return null; // No empty slot found
        }

        function updateEquipmentStats() {
            let totalAC = 10; // Base AC
            let weapon = "No weapon equipped";

            document.querySelectorAll('.equipped-slot .item').forEach(itemElement => {
                const item = JSON.parse(itemElement.dataset.item);
                if (item.ac) {
                    totalAC += parseInt(item.ac) || 0;
                }
                if (item.type === 'weapon') {
                    weapon = `${item.name} (${item.damage} damage)`;
                }
            });

            document.getElementById('total-ac-value').textContent = totalAC;
            document.getElementById('weapon-stats-value').textContent = weapon;
        }

        function updateSlotColors() {
            const allSlots = document.querySelectorAll('.equipped-slot, .inventory-slot');
            allSlots.forEach(slot => {
                if (slot.firstChild) {
                    slot.style.backgroundColor = '#3498db'; // Blue for filled slots
                } else {
                    slot.style.backgroundColor = '#2c3e50'; // Dark gray for empty slots
                }
            });
        }

        function updateModifier(input) {
            const score = parseInt(input.value);
            const modifier = Math.floor((score - 10) / 2);
            const modifierDisplay = document.getElementById(`${input.id}-modifier`);
            modifierDisplay.textContent = `(${modifier >= 0 ? '+' : ''}${modifier})`;
        }

        function rollAbility(ability) {
            const abilityScore = parseInt(document.getElementById(ability).value);
            const modifier = Math.floor((abilityScore - 10) / 2);
            const rollResult = Math.floor(Math.random() * 20) + 1;
            const total = rollResult + modifier;

            const overlay = document.getElementById('roll-overlay');
            const resultDiv = document.getElementById('roll-result');

            resultDiv.innerHTML = `
                <p>D20 Roll: ${rollResult}</p>
                <p>${ability.charAt(0).toUpperCase() + ability.slice(1)} Modifier: ${modifier >= 0 ? '+' : ''}${modifier}</p>
                <p>Total: ${total}</p>
            `;

            overlay.style.display = 'block';

            setTimeout(() => {
                overlay.style.display = 'none';
            }, 3000);
        }

        // Close the overlay when clicking outside the content
        document.getElementById('roll-overlay').addEventListener('click', function(event) {
            if (event.target === this) {
                this.style.display = 'none';
            }
        });

        function toggleEdit(button) {
            const section = button.closest('.section') || button.closest('.basic-info');
            section.classList.toggle('editing');
            button.classList.toggle('editing');

            if (section.classList.contains('editing')) {
                const inputs = section.getElementsByTagName('input');
                const textareas = section.getElementsByTagName('textarea');

                for (let input of inputs) {
                    const display = document.getElementById(`${input.id}-display`);
                    if (display) {
                        input.value = display.textContent;
                    }
                }

                for (let textarea of textareas) {
                    const display = document.getElementById(`${textarea.id}-display`);
                    if (display) {
                        textarea.value = display.textContent;
                    }
                }

                // Special handling for character name and subtitle
                if (section.classList.contains('basic-info')) {
                    document.getElementById('character-name').value = document.getElementById('character-name-display').textContent;
                    document.getElementById('character-subtitle').value = document.getElementById('character-subtitle-display').textContent;
                    
                    // Move the character name and subtitle inputs to the top
                    const nameInput = section.querySelector('#character-name');
                    const subtitleInput = section.querySelector('#character-subtitle');
                    section.insertBefore(subtitleInput, section.firstChild);
                    section.insertBefore(nameInput, section.firstChild);
                    
                    // Move the edit button to the top of the basic-info section
                    const editButton = section.querySelector('.edit-button');
                    section.insertBefore(editButton, section.firstChild);
                }

                // Add specific handling for inventory section
                if (section.querySelector('.inventory-grid')) {
                    const slots = section.querySelectorAll('.inventory-slot, .equipped-slot');
                    slots.forEach(slot => {
                        slot.onclick = section.classList.contains('editing') ? editItem : null;
                    });
                }

                // Add specific handling for gold pieces
                const goldPieces = section.querySelector('.gold-pieces');
                if (goldPieces) {
                    goldPieces.classList.toggle('editing');
                }
            } else {
                updateDisplayValues(section);
                
                // Move the edit button back to its original position for basic-info
                if (section.classList.contains('basic-info')) {
                    const editButton = section.querySelector('.edit-button');
                    section.appendChild(editButton);
                    
                    // Move the character name and subtitle inputs back to their original positions
                    const nameInput = section.querySelector('#character-name');
                    const subtitleInput = section.querySelector('#character-subtitle');
                    section.appendChild(nameInput);
                    section.appendChild(subtitleInput);
                    
                    // Reset all input fields to their normal state
                    const inputs = section.querySelectorAll('input, textarea');
                    inputs.forEach(input => {
                        input.style.display = 'none';
                        const display = document.getElementById(`${input.id}-display`);
                        if (display) {
                            display.style.display = 'block';
                        }
                    });
                }
            }
        }

        function updateDisplayValues(section) {
            const inputs = section.getElementsByTagName('input');
            const textareas = section.getElementsByTagName('textarea');

            for (let input of inputs) {
                const display = document.getElementById(`${input.id}-display`);
                if (display) {
                    display.textContent = input.value;
                }
                if (input.closest('.stat')) {
                    updateModifier(input);
                }
            }

            for (let textarea of textareas) {
                const display = document.getElementById(`${textarea.id}-display`);
                if (display) {
                    display.textContent = textarea.value;
                }
            }

            // Special handling for character name and subtitle
            if (section.classList.contains('basic-info')) {
                document.getElementById('character-name-display').textContent = document.getElementById('character-name').value;
                document.getElementById('character-subtitle-display').textContent = document.getElementById('character-subtitle').value;
            }

            // Trigger auto-save after updating display values
            autoSaveCharacter();
        }

        function stepInput(button, step) {
            const input = button.closest('.number-input-container').querySelector('input');
            input.value = Math.max(Math.min(parseInt(input.value) + step, parseInt(input.max)), parseInt(input.min));
            input.dispatchEvent(new Event('change'));
        }

        function editPortrait() {
            const portraitInput = document.createElement('input');
            portraitInput.type = 'file';
            portraitInput.accept = 'image/*';
            portraitInput.onchange = function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const portrait = document.querySelector('.portrait');
                        const img = new Image();
                        img.onload = function() {
                            const aspectRatio = img.width / img.height;
                            const portraitHeight = portrait.offsetHeight;
                            const portraitWidth = portraitHeight * aspectRatio;
                            portrait.style.backgroundImage = `url(${e.target.result})`;
                            portrait.style.backgroundSize = `${portraitWidth}px ${portraitHeight}px`;
                            portrait.style.backgroundPosition = 'center';
                            portrait.textContent = '';
                            portrait.classList.add('has-image');
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };
            portraitInput.click();
        }

        function toggleDropdown(event) {
            event.stopPropagation(); // Prevent the event from bubbling up
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Close the dropdown if the user clicks outside of it
        window.onclick = function(event) {
            if (!event.target.matches('.character-name')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        function exportCharacter() {
            const character = {
                name: document.querySelector('.character-name').textContent,
                subtitle: document.querySelector('.character-subtitle').textContent,
                race: document.getElementById('race-display').textContent,
                class: document.getElementById('class-display').textContent,
                level: document.getElementById('level-display').textContent,
                background: document.getElementById('background-display').textContent,
                alignment: document.getElementById('alignment-display').textContent,
                portrait: document.querySelector('.portrait').style.backgroundImage,
                abilityScores: {},
                skills: {},
                equipment: []
            };

            // Get ability scores
            document.querySelectorAll('.stat').forEach(stat => {
                const name = stat.querySelector('label').getAttribute('for');
                character.abilityScores[name] = stat.querySelector('.value-display').textContent;
            });

            // Get skills
            document.querySelectorAll('.grid > div:not(.stat)').forEach(skill => {
                const name = skill.querySelector('label').getAttribute('for');
                character.skills[name] = skill.querySelector('.value-display').textContent;
            });

            // Get equipment
            document.querySelectorAll('.equipped-slot .item').forEach(item => {
                character.equipment.push(JSON.parse(item.dataset.item));
            });

            const jsonString = JSON.stringify(character, null, 2);
            const blob = new Blob([jsonString], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'character.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importCharacter() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(event) {
                const file = event.target.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const character = JSON.parse(e.target.result);
                        loadCharacter(character);
                    } catch (error) {
                        console.error('Error parsing character file:', error);
                        alert('Error loading character. Please check the file format.');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function loadCharacter(character) {
            // Basic Info
            document.getElementById('character-name-display').textContent = character.name;
            document.getElementById('character-subtitle-display').textContent = character.subtitle;
            document.getElementById('race-display').textContent = character.race;
            document.getElementById('class-display').textContent = character.class;
            document.getElementById('level-display').textContent = character.level;
            document.getElementById('background-display').textContent = character.background;
            document.getElementById('alignment-display').textContent = character.alignment;

            // Portrait
            if (character.portrait) {
                const portraitElement = document.querySelector('.portrait');
                const img = new Image();
                img.onload = function() {
                    const aspectRatio = img.width / img.height;
                    const portraitHeight = portraitElement.offsetHeight;
                    const portraitWidth = portraitElement.offsetWidth;
                    let newWidth, newHeight;

                    if (aspectRatio > 1) {
                        // Landscape image
                        newHeight = portraitHeight;
                        newWidth = newHeight * aspectRatio;
                    } else {
                        // Portrait image
                        newWidth = portraitWidth;
                        newHeight = newWidth / aspectRatio;
                    }

                    portraitElement.style.backgroundImage = `url(${character.portrait})`;
                    portraitElement.style.backgroundSize = `contain`;
                    portraitElement.style.backgroundPosition = 'center';
                    portraitElement.style.backgroundRepeat = 'no-repeat';
                    portraitElement.textContent = '';
                    portraitElement.classList.add('has-image');
                };
                img.src = character.portrait;
            }

            // Ability Scores
            for (const [name, score] of Object.entries(character.abilityScores)) {
                const display = document.getElementById(`${name}-display`);
                if (display) {
                    display.textContent = score;
                    const input = document.getElementById(name);
                    if (input) {
                        input.value = score;
                        updateModifier(input);
                    }
                }
            }

            // Skills and Combat Stats
            for (const [name, value] of Object.entries(character.skills)) {
                const display = document.getElementById(`${name}-display`);
                if (display) {
                    display.textContent = value;
                }
            }

            // Equipment
            clearInventory();
            if (character.equipment && Array.isArray(character.equipment)) {
                character.equipment.forEach(item => addItemToInventory(item));
            }

            updateEquipmentStats();
            updateSlotColors();

            // Trigger auto-save to ensure the loaded character is saved
            autoSaveCharacter();
        }

        function clearInventory() {
            const slots = document.querySelectorAll('.inventory-slot, .equipped-slot');
            slots.forEach(slot => {
                while (slot.firstChild) {
                    slot.removeChild(slot.firstChild);
                }
            });
        }

        function addItemToInventory(item) {
            const slots = document.querySelectorAll('.inventory-slot:not(:has(.item))');
            if (slots.length > 0) {
                const itemElement = createItemElement(item);
                slots[0].appendChild(itemElement);
            }
        }

        function createItemElement(item) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item';
            itemDiv.draggable = true;
            itemDiv.dataset.item = JSON.stringify(item);
            itemDiv.style.backgroundImage = `url('images/${item.image || 'default_item.png'}')`;
            return itemDiv;
        }

        function autoSaveCharacter() {
            const character = {
                name: document.getElementById('character-name-display').textContent,
                subtitle: document.getElementById('character-subtitle-display').textContent,
                race: document.getElementById('race-display').textContent,
                class: document.getElementById('class-display').textContent,
                level: document.getElementById('level-display').textContent,
                background: document.getElementById('background-display').textContent,
                alignment: document.getElementById('alignment-display').textContent,
                abilityScores: {},
                skills: {},
                // ... gather other character data
            };

            // Gather ability scores
            document.querySelectorAll('.stat').forEach(stat => {
                const name = stat.querySelector('label').getAttribute('for');
                const score = stat.querySelector('.value-display').textContent;
                character.abilityScores[name] = score;
            });

            // Gather skills
            document.querySelectorAll('.grid > div:not(.stat)').forEach(skill => {
                const name = skill.querySelector('label').getAttribute('for');
                const value = skill.querySelector('.value-display').textContent;
                character.skills[name] = value;
            });

            // Convert character object to JSON string
            const jsonString = JSON.stringify(character, null, 2);

            // Use fetch to save the file
            fetch(`../JSONs/${currentCharacterFile}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: jsonString,
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                console.log('Character saved successfully');
            })
            .catch(error => {
                console.error('Error saving character:', error);
                alert('Error saving character. Please try again.');
            });
        }

        function calculateModifier(score) {
            return Math.floor((score - 10) / 2);
        }

        // Call autoSaveCharacter whenever a change is made
        function setupAutoSave() {
            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('change', autoSaveCharacter);
            });

            const editButtons = document.querySelectorAll('.edit-button');
            editButtons.forEach(button => {
                button.addEventListener('click', () => {
                    setTimeout(autoSaveCharacter, 100); // Small delay to ensure changes are applied
                });
            });

            // Add event listeners for inventory changes
            const inventorySlots = document.querySelectorAll('.inventory-slot, .equipped-slot');
            inventorySlots.forEach(slot => {
                slot.addEventListener('drop', () => {
                    setTimeout(autoSaveCharacter, 100);
                });
            });
        }

        // Call setupAutoSave when the page loads
        document.addEventListener('DOMContentLoaded', setupAutoSave);

        window.onload = function() {
            createInventoryGrid();
            populateInventory();
            populateEquippedItems();
            updateEquipmentStats();
            updateSlotColors();
            const numberInputs = document.querySelectorAll('input[type="number"]');
            numberInputs.forEach(createNumberInputContainer);
            const abilityScoreInputs = document.querySelectorAll('.stat input[type="number"]');
            abilityScoreInputs.forEach(updateModifier);

            // Add event listener for character name dropdown
            document.querySelector('.character-name').addEventListener('click', toggleDropdown);
        }
        
    </script>
</body>
</html>
