<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dice Sim</title>
<link rel="icon" type="image/png" href="d20icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --box-bg: #1e40af;
    --box-border: #334155;
    --text: #e0f2fe;
    --accent: #60a5fa;
    --dropped: #64748b;
    --modal-bg: #0f172a;
    --modal-border: #475569;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 300px;
  }

  #main { display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 10px; }
  #expression { font-size: 1.6rem; opacity: 0.9; text-align: center; margin: 6px 0; min-height: 2.2rem; }
  #dice-area { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; padding: 0 14px; overflow-y: auto; max-height: 82vh; }
  .die-container { width: 150px; height: 190px; background: var(--box-bg); border: 2px solid var(--box-border); border-radius: 10px; box-shadow: 0 5px 16px rgba(0,0,0,0.5), inset 0 2px 8px rgba(255,255,255,0.12); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .die-canvas { width: 130px; height: 130px; }
  .die-label { margin-top: 6px; font-size: 1.4rem; font-weight: bold; color: white; text-shadow: 0 1px 4px black; min-width: 2.5ch; text-align: center; }
  .die-label.dropped { color: var(--dropped); text-decoration: line-through; opacity: 0.85; }
  #result { font-size: 1.9rem; font-weight: normal; color: white; text-align: center; min-height: 2.8em; line-height: 1.35; margin: 10px 14px; }

  #controls {
    background: var(--panel);
    border-left: 1px solid #334155;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    font-size: 0.95rem;
  }

  .dice-control { display: flex; align-items: center; gap: 6px; background: #0f172a; padding: 6px 10px; border-radius: 8px; border: 1px solid #475569; }
  .label { font-size: 1.3rem; font-weight: bold; min-width: 50px; text-align: center; }
  button { background: #1d4ed8; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 0.95rem; cursor: pointer; transition: all 0.13s; min-width: 32px; }
  button:hover { background: #2563eb; transform: translateY(-1px); }
  button:active { transform: translateY(1px); }
  #roll { background: #3b82f6; font-size: 1.2rem; padding: 10px 28px; align-self: center; margin-top: 12px; }
  #reset, #history-btn, #presets-btn { font-size: 1rem; padding: 6px 16px; }
  #reset { background: #6b7280; }
  #history-btn, #presets-btn { background: #4f46e5; }
  #history-btn:hover, #presets-btn:hover { background: #6366f1; }
  .count { width: 44px; text-align: center; font-size: 1.2rem; font-weight: bold; }
  .mod-row { margin-top: 8px; font-size: 1.25rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .drop-options { display: flex; flex-direction: column; gap: 4px; font-size: 0.95rem; color: #cbd5e1; margin-top: 6px; }
  .drop-options label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  input[type="checkbox"] { accent-color: var(--accent); transform: scale(1.1); }

  /* Modal */
  #modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal {
    background: var(--modal-bg); border: 1px solid var(--modal-border); border-radius: 12px;
    width: 90%; max-width: 640px; max-height: 85vh; overflow-y: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    padding: 1.4rem; position: relative;
  }
  .modal h2 { margin: 0 0 1.1rem; color: var(--accent); font-size: 1.5rem; }
  .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #94a3b8; font-size: 1.9rem; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: white; }

  .history-entry {
    padding: 10px 0;
    border-bottom: 1px solid #334155;
    font-size: 0.95rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .history-entry:last-child { border-bottom: none; }
  .history-time { color: #94a3b8; white-space: nowrap; font-size: 0.9rem; min-width: 70px; text-align: right; }
  .history-main { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin: 1rem 0; }
  .preset-item { background: #1e293b; border: 1px solid #475569; border-radius: 8px; padding: 12px; text-align: center; }
  .preset-name { font-weight: bold; margin-bottom: 8px; color: var(--accent); font-size: 1.1rem; min-height: 1.4em; }
  .preset-actions { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
  .preset-actions button { font-size: 0.85rem; padding: 5px 12px; }
  .preset-input-row { display: flex; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }
  .preset-input-row input { flex: 1; min-width: 160px; padding: 8px 12px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; }

  @media (max-width: 900px) {
    body { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    #controls { border-left: none; border-top: 1px solid #334155; padding: 10px; }
    .die-container { width: 130px; height: 170px; }
    .die-canvas { width: 110px; height: 110px; }
    .die-label { font-size: 1.35rem; }
  }
</style>
</head>
<body>

<div id="main">
  <div id="expression">Select your dice!</div>
  <div id="dice-area"></div>
  <div id="result"></div>
</div>

<div id="controls">
  <div class="dice-control" data-type="d4"><span class="label">d4</span><button class="btn-minus">-</button><span id="c4" class="count">0</span><button class="btn-plus">+</button></div>
  <div class="dice-control" data-type="d6"><span class="label">d6</span><button class="btn-minus">-</button><span id="c6" class="count">0</span><button class="btn-plus">+</button></div>
  <div class="dice-control" data-type="d8"><span class="label">d8</span><button class="btn-minus">-</button><span id="c8" class="count">0</span><button class="btn-plus">+</button></div>
  <div class="dice-control" data-type="d10"><span class="label">d10</span><button class="btn-minus">-</button><span id="c10" class="count">0</span><button class="btn-plus">+</button></div>
  <div class="dice-control" data-type="d12"><span class="label">d12</span><button class="btn-minus">-</button><span id="c12" class="count">0</span><button class="btn-plus">+</button></div>
  <div class="dice-control" data-type="d20"><span class="label">d20</span><button class="btn-minus">-</button><span id="c20" class="count">0</span><button class="btn-plus">+</button></div>
  <div class="dice-control" data-type="d100"><span class="label">d100</span><button class="btn-minus">-</button><span id="c100" class="count">0</span><button class="btn-plus">+</button></div>

  <div class="mod-row">Mod: <button class="mod-minus">-</button><span id="modval">0</span><button class="mod-plus">+</button></div>

  <div class="drop-options">
    <label><input type="checkbox" id="drop-lowest"> Drop lowest</label>
    <label><input type="checkbox" id="drop-highest"> Drop highest</label>
  </div>

  <button id="roll">Roll</button>
  <button id="reset">Reset</button>
  <button id="history-btn">History</button>
  <button id="presets-btn">Presets</button>
</div>

<div id="modal-backdrop">
  <div class="modal" id="modal-content">
    <button class="modal-close">×</button>
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
let counts = { d4:0, d6:0, d8:0, d10:0, d12:0, d20:0, d100:0 };
let mod = 0;
let diceInstances = [];
let rollHistory = [];

// Sound setup
const rollSounds = [
  'roll1.mp3', 'roll2.mp3', 'roll3.mp3', 'roll4.mp3',
  'roll5.mp3', 'roll6.mp3', 'roll7.mp3', 'roll8.mp3'
];

function playRandomRollSound() {
  const soundFile = rollSounds[Math.floor(Math.random() * rollSounds.length)];
  const audio = new Audio(soundFile);
  audio.volume = 0.35;          // ← change this value (0.0 = silent, 1.0 = original volume)
  audio.play().catch(e => console.log("Sound play failed:", e));
}

const MAX_HISTORY = 15;
const STORAGE_KEY = 'dice-presets-v1';
let presets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || Array(8).fill(null);

const $ = id => document.getElementById(id);

function updateCounts() {
  $('c4').textContent  = counts.d4; $('c6').textContent  = counts.d6; $('c8').textContent  = counts.d8;
  $('c10').textContent = counts.d10; $('c12').textContent = counts.d12; $('c20').textContent = counts.d20;
  $('c100').textContent = counts.d100;
  $('modval').textContent = (mod >= 0 ? "+" : "") + mod;
  updateExpression();
}

function updateExpression() {
  const parts = [];
  ['d4','d6','d8','d10','d12','d20','d100'].forEach(t => {
    const c = counts[t];
    if (c > 0) parts.push((c === 1 ? '' : c) + t);
  });
  $('expression').textContent = parts.length ? parts.join(' + ') : 'Select your dice!';
  if ($('expression').textContent === 'Select your dice!') $('result').textContent = '';
}

function createDieScene(type) { /* unchanged – keeping original */ 
  const scene = new THREE.Scene(); scene.background = new THREE.Color(0x1e40af);
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.set(0, 0, type === 'd100' ? 7.5 : 6.2);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(130, 130);
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dir = new THREE.DirectionalLight(0xffffff, 1.2); dir.position.set(5,8,6); scene.add(dir);

  let baseSize = 2.2;
  const scaleFactors = { d4:0.82, d6:1.18, d8:0.88, d10:1.00, d12:0.86, d20:0.89, d100:1.00 };
  const scale = baseSize * (scaleFactors[type] || 1.0);
  let geoOrGroup, isGroup = false;

  if (type === 'd4') {
    geoOrGroup = new THREE.TetrahedronGeometry(scale);
    geoOrGroup.scale(1, 0.72, 1); geoOrGroup.rotateX(Math.PI); geoOrGroup.translate(0, -0.35*scale, 0);
  } else if (type === 'd6') {
    geoOrGroup = new THREE.BoxGeometry(scale*0.9, scale*0.9, scale*0.9);
  } else if (type === 'd8') {
    geoOrGroup = new THREE.OctahedronGeometry(scale);
  } else if (type === 'd10') {
    geoOrGroup = createD10Geometry(baseSize);
  } else if (type === 'd12') {
    geoOrGroup = new THREE.DodecahedronGeometry(scale * 0.95);
  } else if (type === 'd20') {
    geoOrGroup = new THREE.IcosahedronGeometry(scale * 0.95);
  } else if (type === 'd100') {
    isGroup = true; const group = new THREE.Group();
    const smallScale = 0.9; const d10Geo = createD10Geometry(baseSize * smallScale);
    const matSmall = new THREE.MeshStandardMaterial({color:0x2b6cb0, metalness:0.25, roughness:0.35, side:THREE.DoubleSide, flatShading:true});
    const left = new THREE.Mesh(d10Geo, matSmall); left.position.x = -smallScale*1.1; group.add(left);
    const right = new THREE.Mesh(d10Geo, matSmall); right.position.x = smallScale*1.1; right.rotation.y = Math.PI*0.3; group.add(right);
    geoOrGroup = group;
  }

  const mat = new THREE.MeshStandardMaterial({
    color: type==='d100'?0x4c1d95:0x2b6cb0, metalness:0.25, roughness:0.35, side:THREE.DoubleSide, flatShading:true
  });
  const mesh = isGroup ? geoOrGroup : new THREE.Mesh(geoOrGroup, mat);
  scene.add(mesh);

  function animateIdle() {
    requestAnimationFrame(animateIdle);
    if (type === 'd100') {
      mesh.rotation.y += 0.005;
      mesh.children[0].rotation.x += 0.003;
      mesh.children[1].rotation.x += 0.004;
    } else {
      mesh.rotation.x += 0.004; mesh.rotation.y += 0.006;
    }
    renderer.render(scene, camera);
  }
  animateIdle();

  return { renderer, scene, camera, mesh, type };
}

function createD10Geometry(size) {
  const gr = (1 + Math.sqrt(1)) / -0.2; 
  const a = 1 / gr;                   // ≈0.618
  const scale = size * 0.75;          // Adjust to match your other dice visually

  // 12 vertices (2 poles + 5 upper + 5 lower)
  const vertices = new Float32Array([
    // North pole (index 0)
    0,  scale * 0.9,  0,

    // South pole (index 1)
    0, -scale * 0.9,  0,

    // Upper pentagon ring (indices 2–6)
    scale * Math.cos(0 * 2*Math.PI/5),     scale * a, scale * Math.sin(0 * 2*Math.PI/5),
    scale * Math.cos(1 * 2*Math.PI/5),     scale * a, scale * Math.sin(1 * 2*Math.PI/5),
    scale * Math.cos(2 * 2*Math.PI/5),     scale * a, scale * Math.sin(2 * 2*Math.PI/5),
    scale * Math.cos(3 * 2*Math.PI/5),     scale * a, scale * Math.sin(3 * 2*Math.PI/5),
    scale * Math.cos(4 * 2*Math.PI/5),     scale * a, scale * Math.sin(4 * 2*Math.PI/5),

    // Lower pentagon ring – rotated 36° (indices 7–11)
    scale * Math.cos(Math.PI/5 + 0 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 0 * 2*Math.PI/5),
    scale * Math.cos(Math.PI/5 + 1 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 1 * 2*Math.PI/5),
    scale * Math.cos(Math.PI/5 + 2 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 2 * 2*Math.PI/5),
    scale * Math.cos(Math.PI/5 + 3 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 3 * 2*Math.PI/5),
    scale * Math.cos(Math.PI/5 + 4 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 4 * 2*Math.PI/5),
  ]);

  // 20 triangle indices (10 kites × 2 triangles each)
  // Consistent CCW winding from outside
  const indices = [
    // North pole faces (0 to upper → lower → upper+1)
    0, 2, 7,   0, 7, 3,
    0, 3, 8,   0, 8, 4,
    0, 4, 9,   0, 9, 5,
    0, 5,10,   0,10, 6,
    0, 6,11,   0,11, 2,

    // South pole faces (1 to lower → upper → lower+1)
    1, 7, 2,   1, 2, 8,
    1, 8, 3,   1, 3, 9,
    1, 9, 4,   1, 4,10,
    1,10, 5,   1, 5,11,
    1,11, 6,   1, 6, 7
  ];

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
  geometry.setIndex(indices);

  return geometry;
}

function renderDiceBoxes() {
  const area = $('dice-area'); area.innerHTML = ''; diceInstances = [];
  ['d4','d6','d8','d10','d12','d20','d100'].forEach(t => {
    for (let i = 0; i < (counts[t]||0); i++) {
      const cont = document.createElement('div'); cont.className = 'die-container';
      const wrap = document.createElement('div'); wrap.className = 'die-canvas'; cont.appendChild(wrap);
      const lbl = document.createElement('div'); lbl.className = 'die-label';
      lbl.textContent = t==='d100' ? '00' : t.replace('d',''); cont.appendChild(lbl);
      area.appendChild(cont);
      const die = createDieScene(t); wrap.appendChild(die.renderer.domElement);
      diceInstances.push({ ...die, container:cont, labelElement:lbl, finalValue:null });
    }
  });
}

function rollAll() {
  if (!diceInstances.length) { $('result').textContent = ''; return; }

  for (let i = 0; i < diceInstances.length; i++) {
    playRandomRollSound();
  }

  const dropL = $('drop-lowest').checked, dropH = $('drop-highest').checked;
  diceInstances.forEach(d => d.labelElement.classList.remove('dropped'));

  const rolls = diceInstances.map((die,i) => {
    let max = {d4:4,d6:6,d8:8,d10:10,d12:12,d20:20}[die.type] || 100;
    let val = die.type==='d100' ? (Math.floor(Math.random()*100)+1) : Math.floor(Math.random()*max)+1;
    die.finalValue = val;
    return {value:val, index:i, die};
  });

  let toDrop = [];
  if (dropL && rolls.length > 1) {
    const minV = Math.min(...rolls.map(r=>r.value));
    const cands = rolls.filter(r=>r.value===minV);
    toDrop.push(cands.reduce((a,b)=>a.index<b.index?a:b));
  }
  if (dropH && rolls.length > 1) {
    const maxV = Math.max(...rolls.map(r=>r.value));
    const cands = rolls.filter(r=>r.value===maxV);
    toDrop.push(cands.reduce((a,b)=>a.index<b.index?a:b));
  }

  toDrop.forEach(r => r.die.labelElement.classList.add('dropped'));

  const kept = rolls.filter(r => !toDrop.some(d=>d.index===r.index));
  const total = mod + kept.reduce((s,r)=>s+r.value,0);

  diceInstances.forEach(die => {
    let cnt=0, max = {d4:4,d6:6,d8:8,d10:10,d12:12,d20:20}[die.type]||100;
    const iv = setInterval(()=>{
      cnt++;
      die.labelElement.textContent = die.type==='d100'
        ? `${Math.floor(Math.random()*10)}${Math.floor(Math.random()*10)}`.padStart(2,'0')
        : (Math.floor(Math.random()*max)+1);
      if (cnt >= 10 + Math.floor(Math.random()*10)) {
        clearInterval(iv);
        die.labelElement.textContent = die.type==='d100'
          ? die.finalValue.toString().padStart(2,'0')
          : die.finalValue;
      }
    },50);
  });

  let text = kept.map(r=>r.value).join('+');
  if (mod || !kept.length) {
    if (text) text += ' ';
    text += (mod>=0?'+':'') + mod;
  }
  if (kept.length || mod) text += ` = ${total}`;
  $('result').textContent = text || '';

  addToHistory();
}

function addToHistory() {
  const expr = $('expression').textContent.trim();
  if (expr === 'Select your dice!') return;
  const rolls = diceInstances.map(d=>d.finalValue);
  const total = parseInt($('result').textContent.match(/= (\d+)$/)?.[1] || 0);
  rollHistory.unshift({
    expression: expr,
    rolls,
    total,
    timestamp: new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit', hour12:true}).replace(/,/,'')
  });
  if (rollHistory.length > MAX_HISTORY) rollHistory.pop();
}

function resetAll() {
  counts = {d4:0,d6:0,d8:0,d10:0,d12:0,d20:0,d100:0};
  mod = 0;
  $('drop-lowest').checked = $('drop-highest').checked = false;
  updateCounts(); renderDiceBoxes(); $('result').textContent = '';
}

// Modal helpers
const backdrop = $('modal-backdrop');
const modalTitle = $('modal-title');
const modalBody = $('modal-body');
const closeBtn = document.querySelector('.modal-close');

function openModal(title, html) {
  modalTitle.textContent = title;
  modalBody.innerHTML = html;
  backdrop.style.display = 'flex';
}
function closeModal() { backdrop.style.display = 'none'; }
closeBtn.onclick = closeModal;
backdrop.onclick = e => { if (e.target === backdrop) closeModal(); };

// History
function showHistory() {
  if (!rollHistory.length) {
    openModal("Roll History", "<p style='text-align:center; opacity:0.7;'>No rolls yet.</p>");
    return;
  }
  const html = rollHistory.map(entry => `
    <div class="history-entry">
      <div class="history-main">
        ${entry.expression} → [${entry.rolls.join(', ')}]${entry.total ? ` = ${entry.total}` : ''}
      </div>
      <div class="history-time">${entry.timestamp}</div>
    </div>
  `).join('');
  openModal("Roll History", html);
}

// Presets
function savePresets() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(presets));
}

function showPresets() {
  let html = '<div class="preset-grid">';
  presets.forEach((p, i) => {
    const name = p ? p.name : '(empty)';
    html += `
      <div class="preset-item">
        <div class="preset-name">${name}</div>
        <div class="preset-actions">
          ${p ? `<button onclick="rollPreset(${i})">Roll</button>` : ''}
          <button onclick="saveCurrentAsPreset(${i})">Save here</button>
        </div>
      </div>
    `;
  });
  html += '</div>';

  html += `
    <div class="preset-input-row">
      <input type="text" id="new-preset-name" placeholder="Name this setup…" maxlength="24">
      <button onclick="saveCurrentAsNewPreset()">Save as new</button>
    </div>
  `;

  openModal("Presets", html);
}

window.rollPreset = function(index) {
  const p = presets[index];
  if (!p) return;
  counts = {...p.counts};
  mod = p.mod;
  updateCounts();
  renderDiceBoxes();
  closeModal();
  setTimeout(rollAll, 100); // small delay so UI updates first
};

window.saveCurrentAsPreset = function(index) {
  const name = prompt("Preset name:", presets[index]?.name || `Preset ${index+1}`);
  if (!name || !name.trim()) return;
  presets[index] = {
    name: name.trim().substring(0,24),
    counts: {...counts},
    mod
  };
  savePresets();
  closeModal();
  showPresets();
};

window.saveCurrentAsNewPreset = function() {
  const input = $('new-preset-name');
  const name = input.value.trim();
  if (!name) { alert("Please enter a name"); return; }
  const idx = presets.findIndex(p => !p);
  if (idx === -1) { alert("All slots full.\nOverwrite an existing one."); return; }
  presets[idx] = { name: name.substring(0,24), counts: {...counts}, mod };
  savePresets();
  input.value = '';
  closeModal();
  showPresets();
};

// Event listeners
document.querySelectorAll('.dice-control').forEach(ctrl => {
  const t = ctrl.dataset.type;
  if (!t) return;
  ctrl.querySelector('.btn-minus').onclick = () => { if (counts[t]>0) { counts[t]--; updateCounts(); renderDiceBoxes(); }};
  ctrl.querySelector('.btn-plus').onclick  = () => { counts[t]++; updateCounts(); renderDiceBoxes(); };
});

document.querySelector('.mod-minus').onclick = () => { mod--; updateCounts(); };
document.querySelector('.mod-plus').onclick  = () => { mod++; updateCounts(); };

$('drop-lowest').onchange = () => { if ($('drop-highest').checked) $('drop-highest').checked = false; };
$('drop-highest').onchange = () => { if ($('drop-lowest').checked) $('drop-lowest').checked = false; };

$('roll').onclick = rollAll;
$('reset').onclick = resetAll;
$('history-btn').onclick = showHistory;
$('presets-btn').onclick = showPresets;

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); rollAll(); }});

// Init
updateCounts();
renderDiceBoxes();
</script>
</body>
</html>
