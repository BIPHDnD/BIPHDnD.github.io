function playRandomRollSound() {
  if (rollSounds.length === 0) return;
  const idx = Math.floor(Math.random() * rollSounds.length);
  const audio = new Audio(rollSounds[idx]);
  audio.volume = 0.35;
  audio.play().catch(() => {});
}


function rollNoticeOrLead(char, abilityName) {
  console.log(`Starting ${abilityName} roll for ${char.name}`);

  // Clean previous state
  closeDiceResults();

  const cleanName = abilityName.replace(/^Specialist:\s*/i, '').trim();

  const resultsEl = document.getElementById('dice-results');
  if (!resultsEl) return;

  resultsEl.classList.add('skill-roll-mode');
  resultsEl.style.display = 'block';

  // Hide column titles & labels
  document.querySelectorAll('.dice-column h4, #attack-label, #damage-label, #trauma-label').forEach(el => {
    el.style.display = 'none';
  });

  // Hide other columns & overlays
  document.getElementById('damage-preview').style.display = 'none';
  document.getElementById('trauma-preview').style.display = 'none';
  document.querySelectorAll('[id$="-overlay"]').forEach(el => el.style.display = 'none');

  const container = document.getElementById('attack-dice');
  container.innerHTML = '';           // clear previous dice + result-summary

  const count = 3;
  const dieType = 'd6';

  const diceElements = [];

  // Create three d6
  for (let i = 0; i < count; i++) {
    const die = createDieScene(dieType);
    if (!die?.renderer) continue;

    const mini = document.createElement('div');
    mini.className = 'die-mini';
    mini._die = die;

    const wrap = document.createElement('div');
    wrap.className = 'die-canvas';
    wrap.appendChild(die.renderer.domElement);
    mini.appendChild(wrap);

    const valEl = document.createElement('div');
    valEl.className = 'die-value';
    valEl.textContent = '?';
    mini.appendChild(valEl);

    container.appendChild(mini);
    diceElements.push({ mini, valEl, die });

    setTimeout(() => {
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      if (w > 0 && h > 0) {
        die.renderer.setSize(w, h);
        die.camera.aspect = w / h;
        die.camera.updateProjectionMatrix();
      }
    }, 100);
  }

  // Generate roll
  let rolls = Array.from({ length: count }, (_, i) => ({
    value: Math.floor(Math.random() * 6) + 1,
    index: i
  }));

  // Drop lowest
  let toDrop = [];
  if (count > 1) {
    const minV = Math.min(...rolls.map(r => r.value));
    const cands = rolls.filter(r => r.value === minV);
    toDrop.push(cands.reduce((a, b) => a.index < b.index ? a : b));
  }

  const kept = rolls.filter(r => !toDrop.some(d => d.index === r.index));
  const total = kept.reduce((s, r) => s + r.value, 0);

  // Animation
  let frame = 0;
  const cycling = setInterval(() => {
    frame++;
    diceElements.forEach(({ valEl }) => {
      valEl.textContent = Math.floor(Math.random() * 6) + 1;
    });

    if (frame > 20 + Math.random() * 15) {
      clearInterval(cycling);

      diceElements.forEach(({ mini, valEl }, i) => {
        valEl.textContent = rolls[i].value;
        if (toDrop.some(d => d.index === i)) {
          mini.classList.add('dropped');
        }
      });

      // Clean result (no "drop x" text)
      const resultDiv = document.createElement('div');
      resultDiv.className = 'result-summary';
      resultDiv.textContent = `${kept.map(r => r.value).join(' + ')} = ${total}`;
      container.parentElement.appendChild(resultDiv); // below dice

      playRandomRollSound();

// After determining toDrop
const droppedIdx = toDrop.length > 0 ? [toDrop[0].index] : [];

// Then when logging:
addToHistory(
  `${cleanName} (3d6 drop lowest)`,
  rolls.map(r => r.value),
  total,
  droppedIdx
      );
    }
  }, 60);

  // Make the whole skill roll area re-rollable
  const attackPreview = document.getElementById('attack-preview');
  attackPreview.onclick = () => {
    // Re-roll same skill
    rollNoticeOrLead(char, abilityName);
  };
  attackPreview.style.cursor = 'pointer';
  scrollToDiceResults();
}


function scrollToDiceResults(smooth = true) {
  const diceEl = document.getElementById('dice-results');
  if (!diceEl) return;

  // Small delay so DOM has time to show the element
  setTimeout(() => {
    diceEl.scrollIntoView({
      behavior: smooth ? 'smooth' : 'auto',
      block: 'start',          // try 'center' if you prefer it more centered
      inline: 'nearest'
    });
  }, 80);
}


function scrollToSelectedCharacter() {
  if (window.innerWidth >= 768) return; // skip on desktop/tablet

  const container = document.querySelector('.character-container.selected');
  if (!container) return;

  setTimeout(() => {
    container.scrollIntoView({
      behavior: 'smooth',
      block: 'center',     // or 'center'
      inline: 'center'
    });
  }, 120);
}


function addToHistory(expression, rolls, total, droppedIndices = []) {
  rollHistory.unshift({
    expression,
    rolls,                // still the raw numbers
    total,
    droppedIndices,       // new: array of indices that were dropped
    timestamp: new Date().toLocaleTimeString([], {
      hour: 'numeric',
      minute: '2-digit',
      hour12: true
    })
  });
  if (rollHistory.length > MAX_HISTORY) rollHistory.pop();
}


function showHistory() {
  if (!rollHistory.length) {
    // Simple "no rolls" modal
    const modal = document.createElement('div');
    modal.style.cssText = `
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 2000;
      display: flex; align-items: center; justify-content: center;
    `;
    modal.innerHTML = `
      <div style="background:#0f172a; border:1px solid #334155; border-radius:8px; max-width:500px; width:90%; padding:2rem; text-align:center;">
        <h3 style="margin:0 0 1.2rem; color:#60a5fa;">Roll History</h3>
        <p style="opacity:0.7; margin:0;">No rolls yet.</p>
        <button onclick="this.closest('.modal-container').remove()" 
                style="margin-top:1.5rem; background:#334155; color:white; border:none; padding:0.7rem 1.4rem; border-radius:6px; cursor:pointer;">
          Close
        </button>
      </div>
    `;
    modal.className = 'modal-container'; // just for the close selector
    document.body.appendChild(modal);
    return;
  }

  
  const html = rollHistory.map(entry => {
    const rollDisplay = entry.rolls.map((val, idx) => {
      if (entry.droppedIndices?.includes(idx)) {
        return `<s style="color:#94a3b8; opacity:0.7;">${val}</s>`;
      }
      return val;
    }).join(', ');

    return `
      <div class="history-entry">
        <div class="history-main">
          ${entry.expression} → [${rollDisplay}]${entry.total != null ? ` = ${entry.total}` : ''}
        </div>
        <div class="history-time">${entry.timestamp}</div>
      </div>
    `;
  }).join('');

  // Actual history modal
  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 2000;
    display: flex; align-items: center; justify-content: center;
  `;
  modal.innerHTML = `
    <div style="background:#0f172a; border:1px solid #334155; border-radius:8px; max-width:520px; width:90%; max-height:85vh; overflow-y:auto; padding:1.5rem 1.8rem;">
      <h3 style="margin:0 0 1.2rem; color:#60a5fa; font-size:1.4rem;">Roll History</h3>
      ${html}
      <div style="text-align:center; margin-top:1.5rem;">
        <button onclick="this.closest('.modal-container').remove()" 
                style="background:#334155; color:white; border:none; padding:0.7rem 1.6rem; border-radius:6px; cursor:pointer; font-size:1rem;">
          Close
        </button>
      </div>
    </div>
  `;
  modal.className = 'modal-container';
  document.body.appendChild(modal);
}


// ── 3D Dice Roller Helpers ────────────────────────────────────────────────
const diceCache = {}; // Reuse scenes to avoid recreating every time

function createDieScene(type = 'd20') {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f172a); // match your dark theme

  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  
  // Adjust camera distance based on die type for better framing in small containers
  const camDist = {
    'd4':   7.0,
    'd6':   6.2,
    'd8':   6.5,
    'd10':  7.0,
    'd12':  7.5,
    'd20':  6.8,
    'd100': 8.0
  }[type] || 6.5;
  camera.position.set(0, 0, camDist);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(140, 140); // initial size – will be resized later when inserted

  // Lighting – slightly brighter for small/mini view
  scene.add(new THREE.AmbientLight(0xffffff, 0.9));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(5, 8, 6);
  scene.add(dirLight);

  let geo;
  const baseScale = 2.2;

  if (type === 'd4') {
    geo = new THREE.TetrahedronGeometry(baseScale * 0.9);
    geo.scale(1, 0.75, 1);
    geo.rotateX(Math.PI * 0.5);
  } else if (type === 'd6') {
    geo = new THREE.BoxGeometry(baseScale * 0.9, baseScale * 0.9, baseScale * 0.9);
  } else if (type === 'd8') {
    geo = new THREE.OctahedronGeometry(baseScale);
  } else if (type === 'd10') {
    geo = createD10Geometry(baseScale); // ← keep your custom d10 if you have it
  } else if (type === 'd12') {
    geo = new THREE.DodecahedronGeometry(baseScale * 0.95);
  } else if (type === 'd20') {
    geo = new THREE.IcosahedronGeometry(baseScale * 0.95);
  } else if (type === 'd100') {
    // Simplified dual d10 style (you can use your full group version)
    const group = new THREE.Group();
    const smallScale = 0.9;
    const d10Geo = createD10Geometry(baseScale * smallScale);
    const mat = new THREE.MeshStandardMaterial({color:0x2b6cb0, metalness:0.25, roughness:0.35, side:THREE.DoubleSide, flatShading:true});
    const left = new THREE.Mesh(d10Geo, mat);
    left.position.x = -smallScale * 1.1;
    group.add(left);
    const right = new THREE.Mesh(d10Geo, mat);
    right.position.x = smallScale * 1.1;
    right.rotation.y = Math.PI * 0.3;
    group.add(right);
    geo = group;
  } else {
    // Fallback
    geo = new THREE.BoxGeometry(baseScale, baseScale, baseScale);
  }

  const material = new THREE.MeshStandardMaterial({
    color: type === 'd100' ? 0x4c1d95 : 0x2b6cb0,
    metalness: 0.25,
    roughness: 0.35,
    flatShading: true,
    side: THREE.DoubleSide
  });

  const mesh = (type === 'd100' && geo instanceof THREE.Group) ? geo : new THREE.Mesh(geo, material);
  scene.add(mesh);

function createD10Geometry(size) {
  const gr = (1 + Math.sqrt(1)) / -0.2; 
  const a = 1 / gr;                   // ≈0.618
  const scale = size * 0.75;          // Adjust to match your other dice visually

  // 12 vertices (2 poles + 5 upper + 5 lower)
  const vertices = new Float32Array([
    // North pole (index 0)
    0,  scale * 0.9,  0,

    // South pole (index 1)
    0, -scale * 0.9,  0,

    // Upper pentagon ring (indices 2–6)
    scale * Math.cos(0 * 2*Math.PI/5),     scale * a, scale * Math.sin(0 * 2*Math.PI/5),
    scale * Math.cos(1 * 2*Math.PI/5),     scale * a, scale * Math.sin(1 * 2*Math.PI/5),
    scale * Math.cos(2 * 2*Math.PI/5),     scale * a, scale * Math.sin(2 * 2*Math.PI/5),
    scale * Math.cos(3 * 2*Math.PI/5),     scale * a, scale * Math.sin(3 * 2*Math.PI/5),
    scale * Math.cos(4 * 2*Math.PI/5),     scale * a, scale * Math.sin(4 * 2*Math.PI/5),

    // Lower pentagon ring – rotated 36° (indices 7–11)
    scale * Math.cos(Math.PI/5 + 0 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 0 * 2*Math.PI/5),
    scale * Math.cos(Math.PI/5 + 1 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 1 * 2*Math.PI/5),
    scale * Math.cos(Math.PI/5 + 2 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 2 * 2*Math.PI/5),
    scale * Math.cos(Math.PI/5 + 3 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 3 * 2*Math.PI/5),
    scale * Math.cos(Math.PI/5 + 4 * 2*Math.PI/5),    -scale * a, scale * Math.sin(Math.PI/5 + 4 * 2*Math.PI/5),
  ]);

  // 20 triangle indices (10 kites × 2 triangles each)
  // Consistent CCW winding from outside
  const indices = [
    // North pole faces (0 to upper → lower → upper+1)
    0, 2, 7,   0, 7, 3,
    0, 3, 8,   0, 8, 4,
    0, 4, 9,   0, 9, 5,
    0, 5,10,   0,10, 6,
    0, 6,11,   0,11, 2,

    // South pole faces (1 to lower → upper → lower+1)
    1, 7, 2,   1, 2, 8,
    1, 8, 3,   1, 3, 9,
    1, 9, 4,   1, 4,10,
    1,10, 5,   1, 5,11,
    1,11, 6,   1, 6, 7
  ];

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
  geometry.setIndex(indices);

  return geometry;
}

  // Constant idle spin (runs forever)
  function animateIdle() {
    requestAnimationFrame(animateIdle);
    if (type === 'd100' && mesh instanceof THREE.Group) {
      mesh.rotation.y += 0.005;
      mesh.children[0].rotation.x += 0.003;
      mesh.children[1].rotation.x += 0.004;
    } else {
      mesh.rotation.x += 0.004;
      mesh.rotation.y += 0.006;
    }
    renderer.render(scene, camera);
  }
  animateIdle();

  return { renderer, scene, camera, mesh, type };
}

  function rollCategory(category, dieType, count, mod = 0) {
  const cont = containers[category];
  const overlay = document.getElementById(`${category}-overlay`);
  const totalEl = document.getElementById(`${category}-total`);
  const diceEls = cont.children;

  let finalValues = [];

  // Fast cycling animation
  let frame = 0;
  const cycling = setInterval(() => {
    frame++;
    Array.from(diceEls).forEach(el => {
      const sides = parseInt(dieType.slice(1));
      const fake = Math.floor(Math.random() * sides) + 1;
      let valEl = el.querySelector('.die-value');
      if (!valEl) {
        valEl = document.createElement('div');
        valEl.className = 'die-value';
        el.appendChild(valEl);
      }
      valEl.textContent = fake;
    });

    // Stop after random chaos duration (~1.2–2.2s)
    if (frame > 20 + Math.random() * 25) {
      clearInterval(cycling);

      // Final roll
      finalValues = [];
      Array.from(diceEls).forEach((mini, i) => {
        const sides = parseInt(dieType.slice(1));
        const v = Math.floor(Math.random() * sides) + 1;
        finalValues.push(v);

        const valEl = mini.querySelector('.die-value');
        valEl.textContent = v;

        // Visual crit feedback (attack only for now)
        if (category === 'attack' && dieType === 'd20') {
          if (v === 20) {
            mini.querySelector('canvas').style.background = '#14532d';
            valEl.classList.add('crit-success');
          } else if (v === 1) {
            mini.querySelector('canvas').style.background = '#7f1d1d';
            valEl.classList.add('crit-fail');
          }
        }
      });

      // Calculate & display total
      const sum = finalValues.reduce((a,b) => a + b, 0) + mod;
      let eq = finalValues.length > 1 ? finalValues.join(' + ') : finalValues[0];
      let modStr = mod ? (mod >= 0 ? ' + ' : ' − ') + Math.abs(mod) : '';
      totalEl.textContent = `${eq}${modStr} = ${sum}`;

      // ── Log to history ───────────────────────────────────────
      const label = category.charAt(0).toUpperCase() + category.slice(1);
      const sign = mod >= 0 ? '+' : '';
      const expr = count > 1
        ? `${count}${dieType}${mod ? sign + mod : ''}`
        : `${dieType}${mod ? sign + mod : ''}`;

      addToHistory(
        `${label}: ${expr}`,
        finalValues,
        sum
        // no droppedIndices here — weapon rolls don't drop lowest
      );

      // Fade out overlay
      overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = 'none', 450);

      // Optional: scroll to dice area after result appears
      scrollToDiceResults();
    }
  }, 60);

  playRandomRollSound();

  // Start fade-out immediately when clicked
  overlay.style.opacity = '0';
}

  document.getElementById('attack-preview').onclick = () =>

    rollCategory('damage', damageDice, damageCount, damageMod);

  document.getElementById('trauma-preview').onclick = () =>
    rollCategory('trauma', traumaDice, traumaCount, 0);
 
  rollCategory('attack', attackDice, 1, attackMod);
  scrollToDiceResults();
}

  function updateHealth(delta) {
    if (selectedIndex < 0) return;
    const char = characters[selectedIndex];
    const el = elements[selectedIndex];
    const base = char.baseMaxHP;
    const effMax = getEffectiveMax(char);

    const oldHP = char.currentHP;
    const oldSoak = char.soak;

    if (delta > 0) {
      let rem = delta;
      if (getRealHP(char) < base) {
        const heal = Math.min(rem, base - getRealHP(char));
        char.currentHP += heal;
        rem -= heal;
      }
      if (rem > 0 && char.maxSoak > 0 && getRealHP(char) >= base && char.soak < char.maxSoak) {
        const add = Math.min(rem, char.maxSoak - char.soak);
        char.soak += add;
        rem -= add;
      }
      if (rem > 0 && char.avalanche && char.currentHP < effMax) {
        char.currentHP = Math.min(effMax, char.currentHP + rem);
      }
    } else {
      let dmg = -delta;
      if (char.maxSoak > 0 && char.soak > 0) {
        const absorb = Math.min(dmg, char.soak);
        char.soak -= absorb;
        dmg -= absorb;
      }
      if (dmg > 0 && char.currentHP > base) {
        const buf = Math.min(dmg, char.currentHP - base);
        char.currentHP -= buf;
        dmg -= buf;
      }
      if (dmg > 0) {
        char.currentHP = Math.max(0, char.currentHP - dmg);
      }
    }

    if (char.currentHP !== oldHP || char.soak !== oldSoak) {
      char.changeCounter += delta;
      el.hpChange.textContent = char.changeCounter > 0 ? `+${char.changeCounter}` : char.changeCounter;
      el.hpChange.style.display = 'inline-block';
      el.hpChange.classList.remove('hp-change');
      void el.hpChange.offsetWidth;
      el.hpChange.classList.add('hp-change');

      if (char.changeTimeout) clearTimeout(char.changeTimeout);
      char.changeTimeout = setTimeout(() => {
        el.hpChange.style.display = 'none';
        char.changeCounter = 0;
      }, 1000);
    }

    render();
  }

  function toggleAvalanche(i) {
    const char = characters[i];
    const was = char.avalanche;
    char.avalanche = !char.avalanche;
    if (char.avalanche && !was) char.currentHP += 10;
    else if (!char.avalanche && was) char.currentHP = Math.min(char.baseMaxHP, char.currentHP);
    render();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
  const resultsEl = document.getElementById('dice-results');
  if (resultsEl && resultsEl.style.display !== 'none') {
    closeDiceResults();
    render();
  }
  return;
}

    // Prevent up/down from scrolling the page
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
    }

    if (e.key === 'ArrowRight') {
      selectedIndex = (selectedIndex + 1) % characters.length;
      if (selectedIndex === -1) selectedIndex = 0;
      window.scrollTo(0, 0);
      render();
    } else if (e.key === 'ArrowLeft') {
      selectedIndex = (selectedIndex - 1 + characters.length) % characters.length;
      window.scrollTo(0, 0);
      render();
    } else if (e.key === 'ArrowUp') {
      updateHealth(1);
    } else if (e.key === 'ArrowDown') {
      updateHealth(-1);
    }
  });

list.addEventListener('click', e => {
  const container = e.target.closest('.character-container');
  if (container) {
    selectedIndex = parseInt(container.dataset.index);
    window.scrollTo(0, 0);         
    render();
  }
});

  document.addEventListener('change', e => {
    if (e.target.type === 'checkbox') {
      if (e.target.id.startsWith('toggle-')) {
        const i = parseInt(e.target.id.split('-')[1]);
        toggleAvalanche(i);
      } else if (e.target.id.startsWith('ability-')) {
        const [_, charIdx, abIdx] = e.target.id.split('-');
        characters[charIdx].abilities[abIdx].checked = e.target.checked;
        render();
      }
    }
  });

render();
  selectedIndex = 0;
  render();


  // Custom dice state
const customDice = {
  d4:   { count: 0 },
  d6:   { count: 0 },
  d8:   { count: 0 },
  d10:  { count: 0 },
  d12:  { count: 0 },
  d20:  { count: 0 },
  d100: { count: 0 }
};


function performCustomRoll() {
  const parts = [];
  let totalDice = 0;

  for (const [type, data] of Object.entries(customDice)) {
    if (data.count > 0) {
      parts.push(`${data.count}${type}`);
      totalDice += data.count;
    }
  }

  if (totalDice === 0) return; // nothing to roll

  const expression = parts.join(' + ');

  // Show dice area
  closeDiceResults();
  scrollToDiceResults();

  const resultsEl = document.getElementById('dice-results');
  if (resultsEl) {
    resultsEl.style.display = 'block';
    resultsEl.classList.add('skill-roll-mode');
  }

  // Hide weapon-specific columns
  document.querySelectorAll('.dice-column h4, [id$="-overlay"]').forEach(el => el.style.display = 'none');
  const damagePrev = document.getElementById('damage-preview');
  const traumaPrev = document.getElementById('trauma-preview');
  if (damagePrev) damagePrev.style.display = 'none';
  if (traumaPrev) traumaPrev.style.display = 'none';

  // Use attack column for custom roll
  const container = document.getElementById('attack-dice');
  if (container) container.innerHTML = '';

  const diceElements = [];
  let rollResults = [];

  for (const [type, {count}] of Object.entries(customDice)) {
    if (count === 0) continue;
    for (let i = 0; i < count; i++) {
      const die = createDieScene(type);
      if (!die?.renderer) continue;

      const mini = document.createElement('div');
      mini.className = 'die-mini';
      mini._die = die;

      const wrap = document.createElement('div');
      wrap.className = 'die-canvas';
      wrap.appendChild(die.renderer.domElement);
      mini.appendChild(wrap);

      const valEl = document.createElement('div');
      valEl.className = 'die-value';
      valEl.textContent = '?';
      mini.appendChild(valEl);

      container.appendChild(mini);
      diceElements.push({ mini, valEl, type });
    }
  }

  // Once rolled, clear the custom selection
  Object.values(customDice).forEach(d => d.count = 0);
  updateCustomDiceUI();

  // Resize after inserted
  setTimeout(() => {
    diceElements.forEach(({mini}) => {
      const wrap = mini.querySelector('.die-canvas');
      if (!wrap) return;
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      if (w > 0 && h > 0) {
        mini._die.renderer.setSize(w, h);
        mini._die.camera.aspect = w / h;
        mini._die.camera.updateProjectionMatrix();
      }
    });
  }, 120);

  // Roll animation
  let frame = 0;
const cycling = setInterval(() => {
  frame++;
  diceElements.forEach(({valEl}) => {
    valEl.textContent = Math.floor(Math.random() * 20) + 1;
  });

  if (frame > 25 + Math.random() * 20) {
    clearInterval(cycling);

    let sum = 0;
    const individualRolls = [];
    const rollStrings = []; // for nice display

    diceElements.forEach(({valEl, type}) => {
      const sides = parseInt(type.slice(1));
      const v = Math.floor(Math.random() * sides) + 1;
      valEl.textContent = v;
      sum += v;
      individualRolls.push(v);
      
      // Collect for display
      rollStrings.push(v.toString());
    });

      const rollsDisplay = rollStrings.join(' + ');
    const resultText = rollsDisplay 
      ? `${rollsDisplay} = ${sum}`
      : `${expression} = ${sum}`; // fallback if no dice somehow

    // Display total
    const resultDiv = document.createElement('div');
    resultDiv.className = 'result-summary';
    resultDiv.textContent = resultText;
    if (container?.parentElement) container.parentElement.appendChild(resultDiv);

      // Log
      addToHistory(`Custom roll: ${expression}`, individualRolls, sum);

      playRandomRollSound();
      if (typeof scrollToDiceResults === 'function') scrollToDiceResults();

    }
  }, 60);
}


function resetCustomDice() {
    Object.values(customDice).forEach(d => d.count = 0);
  updateCustomDiceUI();

  // Only close results if the dice area is currently visible
  const resultsEl = document.getElementById('dice-results');
  if (resultsEl && resultsEl.style.display !== 'none') {
    closeDiceResults();
  }
  
  // Update the UI (multipliers disappear)
  updateCustomDiceUI();
}

function updateCustomDiceUI() {
  const panel = document.getElementById('custom-dice-panel');
  if (!panel) {
    console.warn("Custom dice panel not found");
    return;
  }

  panel.innerHTML = '';

  const diceTypes = ['d4','d6','d8','d10','d12','d20','d100'];

  diceTypes.forEach(type => {
  const btn = document.createElement('div');
  btn.className = 'custom-die-btn';

  btn.dataset.type = type;

  // Create mini die canvas
  const die = createDieScene(type);
  const canvasWrap = document.createElement('div');
  canvasWrap.style.cssText = 'opacity:100%; width:100%; height:100%; position:absolute; inset:0; border-radius:50%; overflow:hidden;';
  canvasWrap.appendChild(die.renderer.domElement);

  // Force small size
  setTimeout(() => {
    die.renderer.setSize(48, 48);
    die.camera.aspect = 1;
    die.camera.updateProjectionMatrix();
  }, 50);

  btn.appendChild(canvasWrap);

  const label = document.createElement('div');
label.className = 'die-label';
label.textContent = type.toUpperCase();  // or "d4", "d6", etc.
btn.appendChild(label);


    const mult = document.createElement('div');
    mult.className = 'multiplier';
    if (customDice[type].count > 0) {
      mult.textContent = `${customDice[type].count}×`;
      mult.classList.add('visible');
    }
    btn.appendChild(mult);


    const resetX = document.createElement('div');
    resetX.className = 'reset-x';
    resetX.textContent = '×';
    if (customDice[type].count > 0) resetX.classList.add('visible');
    resetX.onclick = e => {
      e.stopPropagation();
      customDice[type].count = 0;
      updateCustomDiceUI();
    };
    btn.appendChild(resetX);

    btn.onclick = () => {
      customDice[type].count = (customDice[type].count + 1) % 21;
      if (customDice[type].count === 0) customDice[type].count = 1;
      updateCustomDiceUI();
    };

    panel.appendChild(btn);
  });

  // Roll button
  const rollBtn = document.createElement('button');
  rollBtn.id = 'roll-custom-btn';
  rollBtn.textContent = 'Roll';
  rollBtn.onclick = performCustomRoll;
  panel.appendChild(rollBtn);

  // Reset button
  const resetBtn = document.createElement('button');
  resetBtn.id = 'reset-custom-btn';
  resetBtn.textContent = '⟲';
  resetBtn.onclick = resetCustomDice;
  panel.appendChild(resetBtn);
}

function initCustomDice() {
  setTimeout(() => {
    updateCustomDiceUI();

    const histBtn = document.getElementById('history-btn');
    if (histBtn) {
      histBtn.onclick = showHistory;
      console.log("History button wired");
    } else {
      console.warn("History button still missing from DOM");
    }
  }, 400);
}


render();
selectedIndex = 0;
render();

const historyBtn = document.getElementById('history-btn');
if (historyBtn) {
  historyBtn.onclick = showHistory;
}


initCustomDice();  

window.addEventListener('resize', () => {
  updateCustomDiceUI(); // rebuilds safely
});


</script>
